      if (sx > -p.w && sx < W + 20) {
        ctx.fillStyle = '#6B3A1F'; ctx.fillRect(sx, p.y + 10, p.w, 4);
        ctx.fillStyle = '#8B5A2F'; ctx.fillRect(sx, p.y, p.w, 10);
        ctx.fillStyle = '#A07040'; ctx.fillRect(sx, p.y, p.w, 3);
      }
    }

    // Draw bird
    const bx = 120, by = runnerBirdY;
    const wingUp2 = frame % 16 < 8;
    ctx.fillStyle = '#ffdd00'; ctx.fillRect(bx + 10, by + 5, 18, 16);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(bx + 14, by, 10, 10);
    ctx.fillStyle = '#fff'; ctx.fillRect(bx + 18, by + 2, 4, 4);
    ctx.fillStyle = '#000'; ctx.fillRect(bx + 19, by + 3, 2, 2);
    ctx.fillStyle = '#ff6600'; ctx.fillRect(bx + 24, by + 4, 6, 3);
    ctx.fillStyle = '#eebb00';
    if (wingUp2) { ctx.fillRect(bx + 3, by + 2, 8, 12); }
    else { ctx.fillRect(bx + 3, by + 12, 8, 12); }

    // Score + progress
    ctx.fillStyle = '#333'; ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'right';
    ctx.fillText(runnerScore + ' / 1000', W - 30, 46);
    // Progress bar
    const progW = 140, progH = 8, progX = W - 30 - progW, progY = 54;
    ctx.fillStyle = '#ccc'; ctx.fillRect(progX, progY, progW, progH);
    ctx.fillStyle = '#44aa44'; ctx.fillRect(progX, progY, progW * Math.min(runnerScore / 1000, 1), progH);

    // Victory overlay
    if (runnerVictory) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 40px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('恭喜通关!', W/2, H/2 - 30);
      ctx.fillStyle = '#fff'; ctx.font = '20px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('小鸟到达终点!', W/2, H/2 + 14);
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 16px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('点击返回', W/2, H/2 + 46);
    }
    // Game over overlay
    if (runnerGameOver && !runnerVictory) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff4444'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('Game Over', W/2, H/2 - 20);
      ctx.fillStyle = '#fff'; ctx.font = '18px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('Score: ' + runnerScore + '  -  Click to retry', W/2, H/2 + 20);
    }
    } // end if runnerStarted

    // Back button
    ctx.fillStyle = '#555'; ctx.fillRect(20, 20, 100, 32);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, 100, 32);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('btn_back'), 70, 42);
  }

  // Lucky Wheel
  if (gameState === 'wheel') {
    ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 32px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('wheel_title'), W/2, 38);

    const wheelCX = W/2, wheelCY = 210, wheelR = 160;
    const segAngle = (Math.PI * 2) / 5;
    const segColors = ['#ffdd00', '#ff66aa', '#ff8800', '#44aaff', '#ff4444'];
    const segLabels = ['wheel_p1', 'wheel_p2', 'wheel_p3', 'wheel_p4', 'wheel_p5'];

    // Draw wheel segments
    for (let i = 0; i < 5; i++) {
      const startA = wheelAngle + i * segAngle - Math.PI / 2;
      const endA = startA + segAngle;
      ctx.fillStyle = segColors[i];
      ctx.beginPath(); ctx.moveTo(wheelCX, wheelCY);
      ctx.arc(wheelCX, wheelCY, wheelR, startA, endA); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      // Label
      const midA = startA + segAngle / 2;
      const lx = wheelCX + Math.cos(midA) * wheelR * 0.65;
      const ly = wheelCY + Math.sin(midA) * wheelR * 0.65;
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t(segLabels[i]), lx, ly);
    }

    // Center circle
    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(wheelCX, wheelCY, 30, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 3; ctx.stroke();
    // Pointer (triangle at top)
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath(); ctx.moveTo(wheelCX, wheelCY - wheelR - 10);
    ctx.lineTo(wheelCX - 16, wheelCY - wheelR + 14);
    ctx.lineTo(wheelCX + 16, wheelCY - wheelR + 14); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

    // Spin button
    if (!wheelSpinning && wheelResult < 0) {
      const sbW = 210, sbH = 44, sbX = W/2 - sbW/2, sbY = 400;
      const wheelCost = currentWorld * 100;
      const canAfford = totalCoins >= wheelCost;
      ctx.fillStyle = canAfford ? '#cc6600' : '#555'; ctx.fillRect(sbX, sbY, sbW, sbH);
      ctx.fillStyle = canAfford ? '#ff8800' : '#777'; ctx.fillRect(sbX + 3, sbY + 3, sbW - 6, sbH - 6);
      ctx.fillStyle = canAfford ? '#fff' : '#999'; ctx.font = 'bold 16px "Courier New"';
      ctx.fillText(t('wheel_spin') + ' (' + wheelCost + '💰)', W/2, sbY + 30);
    }

    // Balance
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 14px "Courier New"';
    ctx.fillText(t('label_total_coins') + totalCoins, W/2, 462);

    // Result display
    if (wheelResult >= 0) {
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 22px "Courier New"';
      ctx.fillText(t('wheel_win') + t(WHEEL_PRIZES[wheelResult].label), W/2, 400);
      const remainSec = Math.ceil(wheelResultTimer / 60);
      ctx.fillStyle = '#aaa'; ctx.font = '13px "Courier New"';
      ctx.fillText(remainSec + t('wheel_countdown'), W/2, 428);
    }

    // Back button
    const wbW = 100, wbH = 32, wbX = W/2 - wbW/2, wbY = H - 46;
    ctx.fillStyle = '#555'; ctx.fillRect(wbX, wbY, wbW, wbH);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(wbX, wbY, wbW, wbH);

    ctx.fillText(t('wheel_back'), W/2, wbY + 22);
  }

  // Character Select (with power-up phase in last 5 seconds)
  if (gameState === 'select') {
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);

    const inPowerUpPhase = selectTimer <= 300;

    if (!inPowerUpPhase) {
      // === FIRST 5 SECONDS: Character Selection ===
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 30px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('sel_title'), W/2, 50);
      ctx.fillStyle = '#fff'; ctx.font = '14px "Courier New"';
      ctx.fillText(t('sel_sub'), W/2, 85);

      const allBirds = getAllBirds();
      const positions = [
        { x: 90, y: 110 },
        { x: 315, y: 110 },
        { x: 540, y: 110 },
        { x: 90, y: 275 },
        { x: 315, y: 275 },
        { x: 540, y: 275 }
      ];
      const boxW = 170, boxH = 145;
      const birdSz = BIRD_W * 1.3;

      for (let i = 0; i < allBirds.length; i++) {
        const b = allBirds[i];
        const px = positions[i].x, py = positions[i].y;

        let fill, stroke;
        if (b.controller === 'p1') {
          fill = 'rgba(255,200,0,0.4)'; stroke = '#ffcc00';
        } else if (b.controller === 'p2') {
          fill = 'rgba(255,100,100,0.4)'; stroke = '#ff4444';
        } else {
          fill = hexToRgba(b.color, 0.2);
          stroke = b.color;
        }

        ctx.fillStyle = fill; ctx.fillRect(px, py, boxW, boxH);
        ctx.strokeStyle = stroke;
        ctx.lineWidth = b.controller !== 'ai' ? 4 : 2;
        ctx.strokeRect(px, py, boxW, boxH);

        drawBirdByType(b, px + boxW/2 - birdSz/2, py + 25, birdSz, BIRD_H * 1.3, frame);

        // Lock overlay
        if (isLocked(b.name)) {
          ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(px, py, boxW, boxH);
          ctx.fillStyle = '#ff4444'; ctx.font = 'bold 32px "Courier New"'; ctx.textAlign = 'center';
          ctx.fillText('🔒', px + boxW/2, py + boxH/2 + 6);
        }

        ctx.fillStyle = stroke;
        ctx.font = 'bold 18px "Courier New"';
        ctx.fillText(bn(b), px + boxW/2, py + 25 + BIRD_H * 1.3 + 22);
      }

      // Gray bird mini selection box
      const gbx = W/2 - 13, gby = 574, gbw = 26, gbh = 16;
      ctx.fillStyle = grayBirdPlayer ? 'rgba(255,200,0,0.4)' : 'rgba(128,128,128,0.25)';
      ctx.fillRect(gbx, gby, gbw, gbh);
      ctx.strokeStyle = grayBirdPlayer ? '#ffcc00' : '#888';
      ctx.lineWidth = grayBirdPlayer ? 2.5 : 1;
      ctx.strokeRect(gbx, gby, gbw, gbh);
      const mix = gbx + 6, miy = gby, miw = 14, mih = 10;
      const wingUpG = frame % 20 < 10;
      ctx.fillStyle = '#999';
      ctx.fillRect(mix + miw*0.3, miy + mih*0.2, miw*0.4, mih*0.35);
      ctx.fillStyle = '#777';
      ctx.fillRect(mix + miw*0.6, miy + mih*0.15, miw*0.25, mih*0.25);
      ctx.fillStyle = '#fff';
      ctx.fillRect(mix + miw*0.64, miy + mih*0.18, miw*0.10, mih*0.10);
      ctx.fillStyle = '#000';
      ctx.fillRect(mix + miw*0.665, miy + mih*0.205, miw*0.05, mih*0.05);
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(mix + miw*0.75, miy + mih*0.22, miw*0.12, mih*0.06);
      ctx.fillStyle = '#888';
      if (wingUpG) ctx.fillRect(mix + miw*0.42, miy + mih*0.02, miw*0.16, mih*0.22);
      else ctx.fillRect(mix + miw*0.38, miy + mih*0.35, miw*0.2, mih*0.22);
      ctx.fillStyle = '#777';
      ctx.fillRect(mix + miw*0.2, miy + mih*0.3, miw*0.2, mih*0.2);
      ctx.fillStyle = '#888'; ctx.font = 'bold 5px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('bird_gray'), gbx + gbw/2, gby + gbh - 2);

      // Gray bird lock overlay
      if (isLocked('gray')) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(gbx, gby, gbw, gbh);
        ctx.fillStyle = '#ff4444'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText('🔒', gbx + gbw/2, gby + gbh/2 + 3);
      }

      ctx.fillStyle = '#888'; ctx.font = '12px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('sel_undo'), W/2, 445);

    }
    else {
      // === LAST 5 SECONDS: Power-Up Selection ===
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 26px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('pu_title'), W/2, 40);

      const puOptions = [
        { id: 'random', icon: '🎲', name: t('pu_random'), desc: t('pu_random_desc'), color: '#aaaacc', bgColor: 'rgba(170,170,204,0.12)' },
        { id: 'superFlight', icon: '🦅', name: t('pu_super'), desc: t('pu_super_desc'), color: '#ff8800', bgColor: 'rgba(255,136,0,0.12)' },
        { id: 'coinMagnet', icon: '🧲', name: t('pu_magnet'), desc: t('pu_magnet_desc'), color: '#ffdd00', bgColor: 'rgba(255,221,0,0.12)' },
        { id: 'doubleTime', icon: '⏱️', name: t('pu_double'), desc: t('pu_double_desc'), color: '#44dd44', bgColor: 'rgba(68,221,68,0.12)' },
        { id: 'selectAll', icon: '⭐', name: t('pu_all'), desc: t('pu_all_desc'), color: '#ff55ff', bgColor: 'rgba(255,85,255,0.12)' },
      ];
      const cardW = 440, cardH = 58, cardStartY = 90, cardGap = 8;
      const cardX = W/2 - cardW/2;

      for (let i = 0; i < puOptions.length; i++) {
        const p = puOptions[i];
        const cy = cardStartY + i * (cardH + cardGap);
        const sel = powerUp === p.id;
        ctx.fillStyle = sel ? p.bgColor : 'rgba(20,20,40,0.85)';
        ctx.fillRect(cardX, cy, cardW, cardH);
        ctx.strokeStyle = sel ? p.color : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = sel ? 3 : 1.5; ctx.strokeRect(cardX, cy, cardW, cardH);
        if (sel) { ctx.shadowColor = p.color; ctx.shadowBlur = 10; ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.strokeRect(cardX, cy, cardW, cardH); ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
        ctx.fillStyle = '#fff'; ctx.font = 'bold 28px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText(p.icon, cardX + 38, cy + 37);
        ctx.fillStyle = p.color; ctx.font = 'bold 15px "Courier New"'; ctx.textAlign = 'left';
        ctx.fillText(p.name, cardX + 72, cy + 25);
        ctx.fillStyle = '#bbb'; ctx.font = '11px "Courier New"';
        ctx.fillText(p.desc, cardX + 72, cy + 45);
        if (p.id === 'selectAll') { ctx.fillStyle = '#ff2222'; ctx.fillRect(cardX + cardW - 38, cy + 4, 30, 16); ctx.fillStyle = '#fff'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center'; ctx.fillText(t('hot'), cardX + cardW - 23, cy + 16); }
        if (sel) { ctx.fillStyle = p.color; ctx.font = 'bold 16px "Courier New"'; ctx.textAlign = 'right'; ctx.fillText('✓', cardX + cardW - 18, cy + 38); }
      }
    }

    // Countdown (always visible)
    const remaining = Math.max(0, Math.ceil(selectTimer / 60));
    ctx.fillStyle = remaining <= 1 ? '#ffdd00' : remaining <= 5 ? '#ffaa00' : '#fff';
    ctx.font = 'bold 15px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(remaining + t('sel_countdown'), W/2, 475);

  } else if (gameState === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    // Determine if the win is "good" (player or CP) or "bad" (opponent)
    let isGoodWin = false;
    let isPlayerWin = false;
    if (winner) {
      if (winner === grayBird) {
        if (grayBirdPlayer) { isGoodWin = true; isPlayerWin = true; }
      } else if (winner.controller === 'p1') {
        isGoodWin = true; isPlayerWin = true;
      } else if (p1Bird && isCP(winner, p1Bird)) {
        isGoodWin = true;
      }
    }

    if (!winSoundPlayed) {
      if (winner) { if (isGoodWin) winJingle(); else loseJingle(); }
      else { winJingle(); loseJingle(); }
      winSoundPlayed = true;
      if (isPlayerWin) { totalCoins += currentWorld * 100; }
      localStorage.setItem('superBirdsTotalCoins', totalCoins);
    }
    if (winner) {
      let winText, winColor;
      if (winner === grayBird) {
        if (grayBirdPlayer) { winText = t('win_you'); winColor = '#ffdd00'; }
        else { winText = t('win_bad'); winColor = '#ff4444'; }
      } else if (winner.controller === 'p1') {
        winText = t('win_you'); winColor = '#ffdd00';
      } else if (p1Bird && isCP(winner, p1Bird)) {
        winText = t('win_cp'); winColor = '#44aaff';
      } else {
        winText = t('win_opp'); winColor = '#ff4444';
      }

      // Trophy for player/CP win, crying face for opponent win
      const emoji = isGoodWin ? '🏆' : '😢';
      ctx.fillStyle = isGoodWin ? '#ffdd00' : '#ff6666';
      ctx.font = 'bold 32px "Courier New"';
      ctx.fillText(emoji, W/2, H/2 - 40);

      ctx.fillStyle = winColor;
      ctx.font = 'bold 28px "Courier New"';
      ctx.fillText(winText, W/2, H/2 + 5);
      ctx.fillStyle = winner === grayBird ? '#888888' : winner.color;
      ctx.font = 'bold 20px "Courier New"';
      const winnerName = winner === grayBird ? t('bird_gray') : bn(winner);
      ctx.fillText(winnerName + ' ' + t('win_reached') + ' ' + Math.floor(winner.maxHeight/10) + t('win_meter'), W/2, H/2 + 45);
      if (isGoodWin) {
        ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 16px "Courier New"';
        ctx.fillText('+' + (currentWorld * 100) + t('win_bonus'), W/2, H/2 + 68);
      }
    } else {
      ctx.fillStyle = '#ff6666'; ctx.font = 'bold 32px "Courier New"';
      ctx.fillText('😢', W/2, H/2 - 40);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 24px "Courier New"';
      ctx.fillText(t('win_draw'), W/2, H/2 + 5);
    }

    const rbx = W/2 - 170, rby = H/2 + 70, rbw = 150, rbh = 55;
    ctx.fillStyle = '#e05030'; ctx.fillRect(rbx, rby, rbw, rbh);
    ctx.fillStyle = '#ff6040'; ctx.fillRect(rbx + 3, rby + 3, rbw - 6, rbh - 6);
    if (hintCurrentIdx === 5) {
      const p3 = 0.5 + 0.5 * Math.sin(frame * 0.1);
      ctx.strokeStyle = 'rgba(255,221,0,' + (0.6 + p3 * 0.4) + ')'; ctx.lineWidth = 5;
      ctx.strokeRect(rbx - 4, rby - 4, rbw + 8, rbh + 8);
    }
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Courier New"';
    ctx.fillText(t('btn_again'), rbx + rbw/2, rby + 37);

    const hbx = W/2 + 20, hby = H/2 + 70, hbw = 150, hbh = 55;
    ctx.fillStyle = '#3080e0'; ctx.fillRect(hbx, hby, hbw, hbh);
    ctx.fillStyle = '#40a0ff'; ctx.fillRect(hbx + 3, hby + 3, hbw - 6, hbh - 6);
    if (hintCurrentIdx === 5) {
      const p4 = 0.5 + 0.5 * Math.sin(frame * 0.1);
      ctx.strokeStyle = 'rgba(255,221,0,' + (0.6 + p4 * 0.4) + ')'; ctx.lineWidth = 5;
      ctx.strokeRect(hbx - 4, hby - 4, hbw + 8, hbh + 8);
    }
    ctx.fillStyle = '#fff';
    ctx.fillText(t('btn_home'), hbx + hbw/2, hby + 37);

    // Treasure chest reward
    const tcY = H/2 + 138;
    // Treasure chest emoji
    ctx.fillStyle = treasureClaimed ? '#ffdd00' : '#fff'; ctx.font = '36px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(treasureClaimed ? '🎉' : '🎁', W/2, tcY + 8);
    // Click bar background
    const barX2 = W/2 - 90, barY2 = tcY + 18, barW2 = 180, barH2 = 18;
    ctx.fillStyle = '#333'; ctx.fillRect(barX2, barY2, barW2, barH2);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.strokeRect(barX2, barY2, barW2, barH2);
    // Golden fill
    if (treasureProgress > 0) {
      const fillGrad = ctx.createLinearGradient(barX2, 0, barX2 + barW2, 0);
      fillGrad.addColorStop(0, '#d4a017'); fillGrad.addColorStop(0.5, '#ffd700'); fillGrad.addColorStop(1, '#ffcc00');
      ctx.fillStyle = fillGrad; ctx.fillRect(barX2 + 2, barY2 + 2, (barW2 - 4) * (treasureProgress / 100), barH2 - 4);
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(barX2 + 2, barY2 + 2, (barW2 - 4) * (treasureProgress / 100), barH2 / 3);
    }
    // Progress text
    ctx.fillStyle = '#ccc'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(treasureProgress) + '%', W/2, barY2 + 14);
    // Golden button
    const gbW = 130, gbH = 34, gbX = W/2 - gbW/2, gbY = barY2 + barH2 + 8;
    const gbGrad = ctx.createLinearGradient(0, gbY, 0, gbY + gbH);
    gbGrad.addColorStop(0, '#ffd700'); gbGrad.addColorStop(0.5, '#ffb800'); gbGrad.addColorStop(1, '#d4a017');
    ctx.fillStyle = gbGrad; ctx.fillRect(gbX, gbY, gbW, gbH);
    ctx.fillStyle = '#b8860b'; ctx.fillRect(gbX + 2, gbY + 2, gbW - 4, gbH - 4);
    ctx.fillStyle = treasureClaimed ? '#888' : '#ffd700'; ctx.font = 'bold 14px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(treasureClaimed ? '已领取 +100 💰' : '点击获奖', W/2, gbY + 23);
    // Reward hint
    if (!treasureClaimed) {
      ctx.fillStyle = '#ffdd00'; ctx.font = '10px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('快速点击填满进度条获得100金币!', W/2, gbY + gbH + 16);
    }
  }

  // Unlock celebration (on top of everything)
  if (unlockCelebration) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);

    const uc = unlockCelebration;
    const birdSize = BIRD_W * 3, birdHSize = BIRD_H * 3;
    const bx = W/2 - birdSize/2, by = 80;

    ctx.fillStyle = 'rgba(255,215,0,0.2)';
    ctx.beginPath(); ctx.arc(W/2, by + birdHSize/2, birdSize * 0.8, 0, Math.PI * 2); ctx.fill();

    if (uc.isGray) {
      const wingUp = frame % 20 < 10;
      ctx.fillStyle = '#999'; ctx.fillRect(bx + birdSize*0.3, by + birdHSize*0.2, birdSize*0.4, birdHSize*0.35);
      ctx.fillStyle = '#777'; ctx.fillRect(bx + birdSize*0.6, by + birdHSize*0.15, birdSize*0.25, birdHSize*0.25);
      ctx.fillStyle = '#fff'; ctx.fillRect(bx + birdSize*0.64, by + birdHSize*0.18, birdSize*0.10, birdHSize*0.10);
      ctx.fillStyle = '#000'; ctx.fillRect(bx + birdSize*0.665, by + birdHSize*0.205, birdSize*0.05, birdHSize*0.05);
      ctx.fillStyle = '#ff6600'; ctx.fillRect(bx + birdSize*0.75, by + birdHSize*0.22, birdSize*0.12, birdHSize*0.06);
      ctx.fillStyle = '#888';
      if (wingUp) ctx.fillRect(bx + birdSize*0.42, by + birdHSize*0.02, birdSize*0.16, birdHSize*0.22);
      else ctx.fillRect(bx + birdSize*0.38, by + birdHSize*0.35, birdSize*0.2, birdHSize*0.22);
      ctx.fillStyle = '#777'; ctx.fillRect(bx + birdSize*0.2, by + birdHSize*0.3, birdSize*0.2, birdHSize*0.2);
    } else {
      const fakeBird = getAllBirds().find(function(b2) { return b2.name === uc.name; }) || { name: uc.name, color: '#888' };
      drawBirdByType(fakeBird, bx, by, birdSize, birdHSize, frame);
    }

    const birdName = uc.isGray ? t('bird_gray') : bn(getAllBirds().find(function(b2){return b2.name===uc.name})||{name:uc.name});
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('unlock_get'), W/2, by + birdHSize + 60);
    ctx.fillText(birdName + ' !', W/2, by + birdHSize + 110);

    ctx.fillStyle = '#ffdd00';
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137 + frame * 0.4) % W + W) % W;
      const sy = ((i * 97 + frame * 0.6) % H + H) % H;
      const sz = 2 + (i % 5);
      ctx.fillRect(sx, sy, sz, sz);
    }
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 15; i++) {
      const sx = ((i * 203 + frame * 0.3) % W + W) % W;
      const sy = ((i * 151 + frame * 0.5) % H + H) % H;
      ctx.fillRect(sx, sy, 2, 2);
    }
  }
  // Hint overlay bar
  if (hintCurrentIdx >= 0) {
    const h = HINT_CONFIGS[hintCurrentIdx];
    const txt = lang === 'zh' ? h.textZh : h.textEn;
    const barX = 40, barW = W - 80, barH = 48, barY = H - 90;
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(barX - 3, barY - 3, barW + 6, barH + 6);
    ctx.fillStyle = 'rgba(10,10,20,0.92)'; ctx.fillRect(barX, barY, barW, barH);
    ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 3; ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 18px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText('\u{1F4A1}', barX + 30, barY + 32);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px "Courier New"'; ctx.textAlign = 'left';
    ctx.fillText(txt, barX + 56, barY + 20);
    ctx.fillStyle = '#ffcc00'; ctx.font = '10px "Courier New"';
    ctx.fillText(lang === 'zh' ? '试试看...' : 'Try it...', barX + 56, barY + 38);
    if (h.timeout > 0) {
      const maxF = Math.floor(h.timeout / 16.67);
      const rem = Math.max(0, 1 - (frame - hintStartFrame) / maxF);
      ctx.fillStyle = 'rgba(255,221,0,0.4)'; ctx.fillRect(barX + 4, barY + barH - 5, (barW - 8) * rem, 3);
    }
    // Golden border pulse on hint indicator
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.1);
    ctx.strokeStyle = 'rgba(255,221,0,' + (0.4 + pulse * 0.6) + ')';
    ctx.lineWidth = 1; ctx.setLineDash([4, 4]); ctx.lineDashOffset = -frame * 2;
    ctx.strokeRect(barX - 6, barY - 6, barW + 12, barH + 12);
    ctx.setLineDash([]);
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function gameLoop() {
  try {
    updateDlgInput();
    if (gameState === 'loading') {
      frame++;
      draw();
      if (frame >= 150) { gameState = 'title'; frame = 0; }
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'portalSpin') {
      if (!cameraSoundPlayed) { cameraShutter(); cameraSoundPlayed = true; }
      portalSpinTimer--;
      frame++;
      draw();
      if (portalSpinTimer <= 0) {
        currentWorld = portalNextWorld;
        initWorld();
        blueBird = makeBird(140, '小蓝', '#4488ff', null, getTraits('小蓝'));
        blueberryBird = makeBird(300, '小蓝莓', '#6666cc', null, getTraits('小蓝莓'));
        greenBird = makeBird(460, '小绿', '#44cc44', null, getTraits('小绿'));
        mangoBird = makeBird(620, '小芒果', '#ffbb33', null, getTraits('小芒果'));
        whiteBird = makeBird(140, '白白', '#eeeeee', null, getTraits('白白'));
        blueWhiteBird = makeBird(460, '蓝蓝', '#b8ccf0', null, getTraits('蓝蓝'));
        p1Bird = null; grayBird = null; grayBirdRespawn = 0; grayBirdPlayer = false;
        portalSpinTimer = 0; portalNextWorld = 0; portalBirdName = null; portalBirdColor = null;
        worldLoadingTimer = 90;
        gameState = 'worldLoading';
      }
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'worldLoading') {
      worldLoadingTimer--;
      frame++;
      draw();
      if (worldLoadingTimer <= 0) { gameState = 'title'; frame = 0; victoryPhoto = null; }
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'runner' && runnerStarted && !runnerGameOver) {
      // Gravity
      runnerBirdVY += 0.6;
      runnerBirdY += runnerBirdVY;
      // Fall off screen = game over
      if (runnerBirdY > H + 40) { runnerGameOver = true; }
      // Ceiling
      if (runnerBirdY < -20) { runnerBirdY = -20; runnerBirdVY = 0; }
      // Scroll world
      runnerScrollX += runnerSpeed;
      // Remove platforms that scrolled off left
      for (let pi = runnerPlatforms.length - 1; pi >= 0; pi--) {
        if (runnerPlatforms[pi].x - runnerScrollX < -100) {
          runnerPlatforms.splice(pi, 1); runnerScore++;
        }
      }
      // Spawn new platforms ahead
      let lastPx = 0;
      for (let pi = 0; pi < runnerPlatforms.length; pi++) {
        if (runnerPlatforms[pi].x > lastPx) lastPx = runnerPlatforms[pi].x;
      }
      while (lastPx - runnerScrollX < W + 200) {
        lastPx += 60 + Math.random() * 100;
        const py = 140 + Math.random() * 220;
        runnerPlatforms.push({ x: lastPx, y: py, w: 50 + Math.random() * 55 });
      }
      // Speed up over time
      runnerSpeed = 4 + runnerScore * 0.12;
      // Platform collision (landing)
      const bx2 = 120, by2 = runnerBirdY + 26, bw2 = 34, bh2 = 6;
      let onPlatform = false;
      for (let pi = 0; pi < runnerPlatforms.length; pi++) {
        const p = runnerPlatforms[pi];
        const sx = p.x - runnerScrollX;
        if (bx2 + bw2 > sx + 4 && bx2 < sx + p.w - 4) {
          if (runnerBirdVY >= 0 && by2 >= p.y - 2 && by2 <= p.y + 8) {
            runnerBirdY = p.y - 26;
            runnerBirdVY = 0;
            onPlatform = true;
          }
        }
      }
      // Victory check
      if (runnerScore >= 1000 && !runnerVictory) { runnerVictory = true; }
      frame++;
      draw();
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'runner' && (!runnerStarted || runnerGameOver || runnerVictory)) {
      frame++;
      draw();
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'wheel' && wheelSpinning) {
      wheelAngle += wheelSpeed;
      wheelSpeed *= 0.985;
      if (wheelSpeed < 0.15) {
        wheelSpinning = false;
        wheelSpeed = 0;
        const segAngle = (Math.PI * 2) / 5;
        const n = ((-wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
        wheelResult = Math.floor(n / segAngle) % 5;
        wheelResultTimer = 300;
        // Award prize
        const prize = WHEEL_PRIZES[wheelResult];
        if (prize.reward === 'coins') {
          totalCoins += prize.amount;
          localStorage.setItem('superBirdsTotalCoins', totalCoins);
        } else if (prize.reward === 'egg') {
          // Bird Egg: unlock a random locked bird that is NOT the next in progression
          const progression = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'];
          let nextIdx = -1;
          for (let pi = 0; pi < progression.length; pi++) {
            if (isLocked(progression[pi])) { nextIdx = pi; break; }
          }
          const candidates = [];
          for (let pi = 0; pi < progression.length; pi++) {
            if (pi !== nextIdx && isLocked(progression[pi])) candidates.push(progression[pi]);
          }
          if (candidates.length > 0) {
            const pick = candidates[Math.floor(Math.random() * candidates.length)];
            unlockSet().add(pick);
            localStorage.setItem(unlockStorageKey(), JSON.stringify([...unlockSet()]));
          }
        } else if (prize.reward === 'newWorld') {
          for (let w = 2; w <= WORLD_COUNT; w++) {
            if (!localStorage.getItem('superBirdsWorld' + w + 'Unlocked')) {
              localStorage.setItem('superBirdsWorld' + w + 'Unlocked', '1');
              break;
            }
          }
        } else if (prize.reward === 'unlockAny') {
          const progression = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'];
          for (let pi = 0; pi < progression.length; pi++) {
            if (isLocked(progression[pi])) {
              unlockSet().add(progression[pi]);
              localStorage.setItem(unlockStorageKey(), JSON.stringify([...unlockSet()]));
              break;
            }
          }
        }
      }
    }
    if (gameState === 'wheel' && wheelResult >= 0 && wheelResultTimer > 0) {
      wheelResultTimer--;
      if (wheelResultTimer <= 0) { wheelResult = -1; }
    }
    if (gameState === 'snow') {
      snowTimer--;
      frame++;
      if (snowTimer <= 0) { gameState = 'playing'; gameStartFrame = frame; }
      draw();
      requestAnimationFrame(gameLoop);
      return;
    }
    if (gameState === 'playing') update();
    if (gameState === 'title' || gameState === 'select' || gameState === 'shop' || gameState === 'worldSelect' || gameState === 'wheel' || gameState === 'runner') frame++;
    if (unlockCelebration) {
      unlockCelebration.timer--;
      if (unlockCelebration.timer <= 0) unlockCelebration = null;
    }
    // Hint game over trigger
    if (gameState === 'over' && !hintFirstGameOver) hintFirstGameOver = true;
    // Hint completion check
    if (hintCurrentIdx >= 0) {
      const h = HINT_CONFIGS[hintCurrentIdx];
      let completed = false;
      if (h.timeout > 0 && (frame - hintStartFrame) >= Math.floor(h.timeout / 16.67)) completed = true;
      else {
        switch (hintCurrentIdx) {
          case 0: completed = hintFirstLandDone; break;
          case 1: completed = hintFirstCoinDone; break;
          case 5: completed = hintDone('hint_gameover'); break;
        }
      }
      if (completed) { hintComplete(h.id); hintCurrentIdx = -1; }
    }
    // Hint activation
    if (hintCurrentIdx < 0) checkHintActivation();
    if (gameState === 'select') {
      selectTimer--;
      if (selectTimer <= 300 && powerUp === null) powerUp = 'random';
      if (selectTimer <= 0) {
        if (powerUp === null || powerUp === 'none' || powerUp === 'random') { const pool = ['superFlight','coinMagnet','doubleTime']; powerUp = pool[Math.floor(Math.random() * pool.length)]; }
        // Track play count for the selected bird
        const chosen = p1Bird || (grayBirdPlayer ? 'gray' : null);
        if (chosen === 'gray') playCount['gray'] = (playCount['gray'] || 0) + 1;
        else if (chosen) playCount[chosen.name] = (playCount[chosen.name] || 0) + 1;
        // Save initial world snapshot for restart
        savedPlatforms = JSON.parse(JSON.stringify(platforms));
        savedCoins = JSON.parse(JSON.stringify(coins));
        savedPipes = JSON.parse(JSON.stringify(pipes));
        savedClouds = JSON.parse(JSON.stringify(clouds));
        // Apply power-up effects
        hasSuperFlight = (powerUp === 'superFlight' || powerUp === 'selectAll');
        coinMagnet = (powerUp === 'coinMagnet' || powerUp === 'selectAll');
        doubleTime = (powerUp === 'doubleTime' || powerUp === 'selectAll');
        grayBirdPowerUp = (powerUp === 'selectAll');
        gameState = 'playing';
        gameStartFrame = 0; frame = 0;
        hintFirstJumpDone = true;
      }
    }
    // Treasure bar drain during game over
    if (gameState === 'over' && !treasureClaimed && treasureProgress > 0) {
      treasureProgress = Math.max(0, treasureProgress - 0.25);
    }
    draw();
  } catch (e) {
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

resetGame();
gameState = 'loading';
frame = 0;
gameLoop();
</script>
