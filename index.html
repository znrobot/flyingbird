});
canvas.addEventListener('pointerleave', function(e) {
  for (const id in dPadActive) { keys[dPadActive[id]] = false; }
  dPadActive = {};
});
canvas.addEventListener('pointermove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldKey = dPadActive[e.pointerId];
  const newKey = hitDPad(mx, my);
  if (oldKey && oldKey !== newKey) { keys[oldKey] = false; delete dPadActive[e.pointerId]; }
  if (newKey && newKey !== oldKey) { keys[newKey] = true; dPadActive[e.pointerId] = newKey; e.preventDefault(); }
});
canvas.style.touchAction = 'none'; // prevent browser gestures on canvas

// Mouse click handler
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // In-game buttons
  if (gameState === 'playing') {
    // Gray bird damage buttons (right side, same rows as D-Pad) — mobile only
    if (isMobile && grayBirdPlayer) {
      const dmX = W - 58, dmW = 40, dmH = 22;
      const dmBtns = [
        { key: 'D', label: t('btn_damage'), color: '#cc4400', x: dmX, y: H - 124 },
        { key: 'F', label: t('btn_damage_pipe'), color: '#aa3300', x: dmX, y: H - 96 },
        { key: 'G', label: t('btn_damage_cloud'), color: '#886600', x: dmX, y: H - 68 },
      ];
      for (const btn of dmBtns) {
        if (mx > btn.x && mx < btn.x + dmW && my > btn.y && my < btn.y + dmH) {
          if (btn.key === 'D') { damageNearestPlatform(); return; }
          if (btn.key === 'F') { damageNearestPipe(); return; }
          if (btn.key === 'G') { damageNearestCloud(); return; }
        }
      }
    }
    const btnW = 75, btnH = 18, btnY = 90, gap = 6;
    if (mx > W/2 - btnW - gap && mx < W/2 - gap && my > btnY && my < btnY + btnH) {
      resetGameSameMap(); gameState = 'playing'; return;
    }
    if (mx > W/2 + gap && mx < W/2 + gap + btnW && my > btnY && my < btnY + btnH) {
      resetGame(); return;
    }

    // Click HUD panel to spectate opponent/CP bird for 5 seconds
    const panelW = 190, panelH = 36;
    const colX = [5, (W - panelW) / 2, W - panelW - 5];
    const birds = getAllBirds();
    for (let i = 0; i < birds.length; i++) {
      const b = birds[i];
      if (b === p1Bird) continue; // skip own bird
      const px = colX[i % 3];
      const py = 10 + Math.floor(i / 3) * (panelH + 6);
      if (mx > px && mx < px + panelW && my > py && my < py + panelH) {
        spectateBird = b; spectateTimer = 300; return;
      }
    }
  }

  // World select screen
  if (gameState === 'worldSelect') {
    const wsW = 230, wsH = 155, wsGap = 12;
    const wsCols = 3;
    const cardsPerPage = 6;
    const totalPages = Math.ceil(WORLD_COUNT / cardsPerPage);
    const startIdx = worldSelectPage * cardsPerPage;
    const pageWorlds = [];
    for (let w = 1; w <= WORLD_COUNT; w++) pageWorlds.push(w);
    const shownWorlds = pageWorlds.slice(startIdx, startIdx + cardsPerPage);
    const wsRows = Math.ceil(shownWorlds.length / wsCols);
    const wsGridW = wsW * Math.min(wsCols, shownWorlds.length) + wsGap * (Math.min(wsCols, shownWorlds.length) - 1);
    const wsStartX = W/2 - wsGridW / 2;
    const wsStartY = 70;

    for (let i = 0; i < shownWorlds.length; i++) {
      const wId = shownWorlds[i];
      const col = i % wsCols, row = Math.floor(i / wsCols);
      const wx = wsStartX + col * (wsW + wsGap), wy = wsStartY + row * (wsH + wsGap);
      if (mx > wx && mx < wx + wsW && my > wy && my < wy + wsH) {
        if (!isWorldUnlocked(wId)) return;
        if (currentWorld !== wId) {
          currentWorld = wId;
          initWorld();
          grayBirdPlayer = false;
          worldLoadingTimer = 90;
          gameState = 'worldLoading';
        }
        return;
      }
    }
    // Page navigation
    const navY = wsStartY + wsRows * (wsH + wsGap) + 10;
    if (worldSelectPage > 0) {
      const lx = W/2 - 55, ly = navY, lw = 36, lh = 24;
      if (mx > lx && mx < lx + lw && my > ly && my < ly + lh) { worldSelectPage--; return; }
    }
    if (startIdx + cardsPerPage < WORLD_COUNT) {
      const rx = W/2 + 19, ry = navY, rw = 36, rh = 24;
      if (mx > rx && mx < rx + rw && my > ry && my < ry + rh) { worldSelectPage++; return; }
    }
    const wsbbW = 120, wsbbH = 36, wsbbX = W/2 - wsbbW/2, wsbbY = H - 56;
    if (mx > wsbbX && mx < wsbbX + wsbbW && my > wsbbY && my < wsbbY + wsbbH) {
      gameState = 'title'; return;
    }
    return;
  }

  // Shop screen
  if (gameState === 'shop') {
    const shopCols = 4, shopRows = 2;
    const cellW = 170, cellH = 140;
    const startX = (W - shopCols * cellW) / 2, startY = 100;
    const shopBirds = [...getAllBirds(), { name: '小灰', _isGray: true }];

    for (let i = 0; i < shopBirds.length; i++) {
      const col = i % shopCols, row = Math.floor(i / shopCols);
      const sx = startX + col * cellW, sy = startY + row * cellH;
      const lockKey = shopBirds[i]._isGray ? 'gray' : shopBirds[i].name;
      if (isLocked(lockKey) && totalCoins >= unlockPrice(lockKey)) {
        if (mx > sx + 30 && mx < sx + cellW - 38 && my > sy + 102 && my < sy + 128) {
          totalCoins -= unlockPrice(lockKey);
          unlockSet().add(lockKey);
          localStorage.setItem('superBirdsTotalCoins', totalCoins);
          localStorage.setItem(unlockStorageKey(), JSON.stringify([...unlockSet()]));
          unlockCelebration = { name: lockKey, isGray: shopBirds[i]._isGray || false, timer: 300 };
          if (shopBirds[i]._isGray) {
            localStorage.setItem('superBirdsDefaultBird', 'gray');
          } else {
            localStorage.setItem('superBirdsDefaultBird', lockKey);
          }
          return;
        }
      }
    }
    // Back button
    const backW2 = 120, backH2 = 36, backX2 = W/2 - backW2/2, backY2 = H - 56;
    if (mx > backX2 && mx < backX2 + backW2 && my > backY2 && my < backY2 + backH2) {
      gameState = 'title'; return;
    }
    return;
  }

  // Wheel screen
  if (gameState === 'wheel') {
    // Back button
    const wbW2 = 100, wbH2 = 32, wbX2 = W/2 - wbW2/2, wbY2 = H - 46;
    if (mx > wbX2 && mx < wbX2 + wbW2 && my > wbY2 && my < wbY2 + wbH2) {
      gameState = 'title'; return;
    }
    // Spin button
    if (!wheelSpinning && wheelResult < 0) {
      const sbW = 210, sbH = 44, sbX = W/2 - sbW/2, sbY = 400;
      if (mx > sbX && mx < sbX + sbW && my > sbY && my < sbY + sbH) {
        const wheelCost = currentWorld * 100;
        if (totalCoins >= wheelCost) {
          totalCoins -= wheelCost;
          localStorage.setItem('superBirdsTotalCoins', totalCoins);
          wheelSpinning = true;
          wheelSpeed = 8 + Math.random() * 8;
          wheelResult = -1;
          wheelResultTimer = 0;
        }
        return;
      }
    }
    return;
  }

  // Title screen
  if (gameState === 'title') {
    // Music popup — click outside circles to close
    if (showMusicPopup) {
      const mcr = 56, mcg = 60, mcY = H/2 - 20;
      const mcOnX = W/2 - mcg - mcr, mcOffX = W/2 + mcg + mcr;
      const distOn = Math.sqrt((mx - mcOnX) ** 2 + (my - mcY) ** 2);
      const distOff = Math.sqrt((mx - mcOffX) ** 2 + (my - mcY) ** 2);
      if (distOn <= mcr) { musicState = 'on'; return; }
      if (distOff <= mcr) { musicState = 'off'; return; }
      showMusicPopup = false;
      return;
    }
    // Dialogue popup
    if (showDialoguePopup) {
      const dlgW = 580, dlgH = 460;
      const dlgX = W/2 - dlgW/2, dlgY = H/2 - dlgH/2;
      const backW = 70, backH = 26, backX = dlgX + 10, backY = dlgY + 8;
      // Back button
      if (mx > backX && mx < backX + backW && my > backY && my < backY + backH) {
        if (dialogueChar) {
          dialogueChar = null; chatMessages = []; stopListening();
        } else {
          showDialoguePopup = false;
        }
        return;
      }
      if (!dialogueChar) {
        // Character selection grid
        const cardW = 96, cardH = 148, gapX = 8, gapY = 8;
        const gridCols = 5;
        const gridStartX = dlgX + 16, gridStartY = dlgY + 88;
        const allKeys = ['bird', 'chick', 'blue', 'green', 'blueberry', 'mango', 'white', 'ice', 'gray', 'group'];
        for (let ci = 0; ci < allKeys.length; ci++) {
          const col = ci % gridCols, row = Math.floor(ci / gridCols);
          const cx = gridStartX + col * (cardW + gapX);
          const cy = gridStartY + row * (cardH + gapY);
          if (mx > cx && mx < cx + cardW && my > cy && my < cy + cardH) {
            openDialogue(allKeys[ci]);
            return;
          }
        }
      } else {
        const chatAreaX = dlgX + 14, chatAreaY = dlgY + 52, chatAreaW = dlgW - 28, chatAreaH = 310;
        const inputY = chatAreaY + chatAreaH + 8;
        // Mic button (centered)
        const micW = 44, micH = 34, micX = chatAreaX + chatAreaW/2 - micW/2, micY = inputY + 8;
        if (mx > micX && mx < micX + micW && my > micY && my < micY + micH) {
          if (isListening) { stopListening(); } else { startListening(); }
          return;
        }
        // AI Settings button (top right)
        const gearW4 = 70, gearH4 = 26, gearX4 = dlgX + dlgW - gearW4 - 10, gearY4 = dlgY + 8;
        if (mx > gearX4 && mx < gearX4 + gearW4 && my > gearY4 && my < gearY4 + gearH4) {
          showAiSettings = !showAiSettings;
          return;
        }
        // AI Settings panel clicks
        if (showAiSettings) {
          const spW3 = 240, spH3 = 160, spX3 = W/2 - spW3/2, spY3 = H/2 - spH3/2;
          const sliderX3 = spX3 + 20, sliderW3 = spW3 - 40, sliderY3 = spY3 + 64;
          if (my > sliderY3 - 8 && my < sliderY3 + 16 && mx > sliderX3 && mx < sliderX3 + sliderW3) {
            aiCreativity = Math.round(((mx - sliderX3) / sliderW3) * 100);
            aiCreativity = Math.max(0, Math.min(100, aiCreativity));
            return;
          }
          const toggleX3 = spX3 + spW3/2 - 20, toggleY3 = spY3 + 114, toggleW3 = 40, toggleH3 = 20;
          if (mx > toggleX3 && mx < toggleX3 + toggleW3 && my > toggleY3 && my < toggleY3 + toggleH3) {
            speechEnabled = !speechEnabled;
            return;
          }
          if (mx > spX3 + spW3 - 60 && mx < spX3 + spW3 - 10 && my > spY3 + 130 && my < spY3 + 152) {
            showAiSettings = false;
            return;
          }
        }
      }
      return;
    }
    // Rules overlay
    if (showRules === 'bird') {
      // Click paper → read rules
      const ppX = ((frame * 0.6) % (W + 120)) - 60 + 48 - 4;
      const ppY = 260 + Math.sin(frame * 0.04) * 20 + 42 * 0.1;
      if (mx > ppX && mx < ppX + 32 && my > ppY && my < ppY + 24) {
        showRules = 'text'; return;
      }
      // Click back button → exit
      if (mx > W/2 - 60 && mx < W/2 + 60 && my > H - 44 && my < H - 8) {
        showRules = false; return;
      }
      return;
    }
    if (showRules === 'text') {
      showRules = false; return;
    }
    const topBtnW2 = 58, topBtnH2 = 26, topBtnGap2 = 3;
    const topTotalW2 = topBtnW2 * 8 + topBtnGap2 * 7;
    const topBtnStartX2 = W/2 - topTotalW2 / 2;
    const topBtnX2 = function(i) { return topBtnStartX2 + (topBtnW2 + topBtnGap2) * i; };
    const topBtnY2 = 192;
    // Language (0)
    if (mx > topBtnX2(0) && mx < topBtnX2(0) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      lang = lang === 'zh' ? 'en' : 'zh'; return;
    }
    // Rules (1)
    if (mx > topBtnX2(1) && mx < topBtnX2(1) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      showRules = 'bird'; rulesBirdFrame = frame; speakRules(); return;
    }
    // Wheel (2)
    if (mx > topBtnX2(2) && mx < topBtnX2(2) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      gameState = 'wheel'; wheelSpinning = false; wheelAngle = 0; wheelResult = -1; wheelResultTimer = 0; return;
    }
    // Shop (3)
    if (mx > topBtnX2(3) && mx < topBtnX2(3) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      gameState = 'shop'; return;
    }
    // Music (4)
    if (mx > topBtnX2(4) && mx < topBtnX2(4) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      showMusicPopup = true; return;
    }
    // Dialogue (5)
    if (mx > topBtnX2(5) && mx < topBtnX2(5) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      showDialoguePopup = true; dialogueChar = null; chatMessages = []; stopListening(); return;
    }
    // Warp World (6)
    if (mx > topBtnX2(6) && mx < topBtnX2(6) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      gameState = 'worldSelect'; worldSelectPage = 0;
      return;
    }
    // Runner game (7)
    if (mx > topBtnX2(7) && mx < topBtnX2(7) + topBtnW2 && my > topBtnY2 && my < topBtnY2 + topBtnH2) {
      gameState = 'runner'; resetRunner(); return;
    }
    // Refresh button
    if (mx > 362 && mx < 441 && my > 310 && my < 338) {
      location.replace(location.href.split('?')[0] + '?v=' + Date.now()); return;
    }
    // Start button
    if (mx > 250 && mx < 550 && my > 370 && my < 440) {
      gameState = 'select'; selectTimer = 600; powerUp = null; loadDefaultBird();
    }
    return;
  }

  // Runner game
  if (gameState === 'runner') {
    // Back button
    const rbBackW = 100, rbBackH = 32, rbBackX = 20, rbBackY = 20;
    if (mx > rbBackX && mx < rbBackX + rbBackW && my > rbBackY && my < rbBackY + rbBackH) {
      gameState = 'title'; return;
    }
    // Start game from preview AND jump
    if (!runnerStarted) { runnerStarted = true; runnerBirdVY = -9; return; }
    // Click to jump
    if (!runnerGameOver && !runnerVictory) { runnerBirdVY = -9; return; }
    // Victory - click to return to title
    if (runnerVictory) { gameState = 'title'; return; }
    // Click to restart when game over
    if (runnerGameOver) { resetRunner(); return; }
    return;
  }

  // Game over buttons
  if (gameState === 'over') {
    const rbx = W/2 - 170, rby = H/2 + 70, rbw = 150, rbh = 55;
    const hbx = W/2 + 20, hby = H/2 + 70, hbw = 150, hbh = 55;
    if (mx > rbx && mx < rbx + rbw && my > rby && my < rby + rbh) { if (hintCurrentIdx === 5) { hintComplete('hint_gameover'); hintCurrentIdx = -1; } resetGameKeepSelection(); gameState = 'playing'; return; }
    if (mx > hbx && mx < hbx + hbw && my > hby && my < hby + hbh) { if (hintCurrentIdx === 5) { hintComplete('hint_gameover'); hintCurrentIdx = -1; } resetGame(); return; }
    // Treasure chest button
    const tcY2 = H/2 + 138, barH3 = 18;
    const barY3 = tcY2 + 18, gbW2 = 130, gbH2 = 34, gbX2 = W/2 - gbW2/2, gbY3 = barY3 + barH3 + 8;
    if (!treasureClaimed && mx > gbX2 && mx < gbX2 + gbW2 && my > gbY3 && my < gbY3 + gbH2) {
      treasureProgress = Math.min(100, treasureProgress + 7);
      if (treasureProgress >= 100) {
        treasureClaimed = true;
        totalCoins += 100;
        localStorage.setItem('superBirdsTotalCoins', totalCoins);
      }
      return;
    }
  }

  // Character / Power-Up selection screen
  if (gameState === 'select' && selectTimer > 300) {
    {
      const birds = getAllBirds();
      const positions = [
        { x: 90, y: 110 },
        { x: 315, y: 110 },
        { x: 540, y: 110 },
        { x: 90, y: 275 },
        { x: 315, y: 275 },
        { x: 540, y: 275 }
      ];
      const bw = 170, bh = 145;
      for (let i = 0; i < birds.length; i++) {
        const px = positions[i].x, py = positions[i].y;
        if (mx > px && mx < px + bw && my > py && my < py + bh) {
          const b = birds[i];
          if (isLocked(b.name)) {
            const price = unlockPrice(b.name);
            if (totalCoins >= price) {
              totalCoins -= price;
              unlockSet().add(b.name);
              localStorage.setItem('superBirdsTotalCoins', totalCoins);
              localStorage.setItem(unlockStorageKey(), JSON.stringify([...unlockSet()]));
              unlockCelebration = { name: b.name, isGray: false, timer: 300 };
              assignBird(b); grayBirdPlayer = false;
            }
          } else {
            assignBird(b); grayBirdPlayer = false;
          }
          return;
        }
      }
      // Gray bird: purchase or select
      if (mx > W/2 - 20 && mx < W/2 + 20 && my > 572 && my < 595) {
        if (isLocked('gray')) {
          const price = unlockPrice('gray');
          if (totalCoins >= price) {
            totalCoins -= price;
            unlockSet().add('gray');
            localStorage.setItem('superBirdsTotalCoins', totalCoins);
            localStorage.setItem(unlockStorageKey(), JSON.stringify([...unlockSet()]));
            unlockCelebration = { name: 'gray', isGray: true, timer: 300 };
            grayBirdPlayer = true;
            if (p1Bird) { p1Bird.controller = 'ai'; p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1; p1Bird = null; }
            localStorage.setItem('superBirdsDefaultBird', 'gray');
          }
        } else {
          if (grayBirdPlayer) {
            grayBirdPlayer = false;
            localStorage.removeItem('superBirdsDefaultBird');
          } else {
            grayBirdPlayer = true;
            if (p1Bird) { p1Bird.controller = 'ai'; p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1; }
            p1Bird = null;
            localStorage.setItem('superBirdsDefaultBird', 'gray');
          }
        }
      }
    }
  }

  // Power-Up selection clicks (during last 5 seconds of select)
  if (gameState === 'select' && selectTimer <= 300) {
    const puOptions = ['random', 'superFlight', 'coinMagnet', 'doubleTime', 'selectAll'];
    const cardW = 440, cardH = 58, cardStartY = 90, cardGap = 8;
    const cardX = W/2 - cardW/2;
    for (let i = 0; i < puOptions.length; i++) {
      const cy = cardStartY + i * (cardH + cardGap);
      if (mx > cardX && mx < cardX + cardW && my > cy && my < cy + cardH) {
        powerUp = puOptions[i];
        return;
      }
    }
  }
});

canvas.style.cursor = 'pointer';

function assignBird(bird) {
  // Clicking already-selected bird → deselect
  if (bird === p1Bird) {
    bird.controller = 'ai';
    bird.spd = (getTraits(bird.name) || {}).spd || 1;
    p1Bird = null;
    localStorage.removeItem('superBirdsDefaultBird');
    return;
  }
  // Deselect previous bird if any
  if (p1Bird) {
    p1Bird.controller = 'ai';
    p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1;
  }
  // Select new bird
  bird.controller = 'p1';
  bird.spd = 2;
  p1Bird = bird;
  localStorage.setItem('superBirdsDefaultBird', bird.name);
}

function loadDefaultBird() {
  const saved = localStorage.getItem('superBirdsDefaultBird');
  if (!saved) return;
  if (saved === 'gray') {
    grayBirdPlayer = true;
    if (p1Bird) { p1Bird.controller = 'ai'; p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1; p1Bird = null; }
    return;
  }
  const birds = getAllBirds();
  for (const b of birds) {
    if (b.name === saved && !isLocked(b.name)) {
      assignBird(b);
      return;
    }
  }
}

function generateWorld(startY, endY) {
  let prevPlatforms = platforms.filter(p => p.y >= startY - 20 && p.y <= startY + 80);
  if (prevPlatforms.length === 0) {
    let bestY = -Infinity;
    for (const p of platforms) { if (p.y > bestY && p.y <= startY + 80) bestY = p.y; }
    prevPlatforms = platforms.filter(p => p.y === bestY);
  }
  const horizontalReach = 160;
  for (let wy = startY; wy >= endY; wy -= PLATFORM_SPACING) {
    const levelPlatforms = [];
    const pw = 120 + Math.random() * 160;
    let px;
    if (prevPlatforms.length > 0) {
      const ref = prevPlatforms[Math.floor(Math.random() * prevPlatforms.length)];
      const refCx = ref.x + ref.w / 2, halfPw = pw / 2;
      const minX = Math.max(30, refCx - horizontalReach - halfPw);
      const maxX = Math.min(W - pw - 30, refCx + horizontalReach - halfPw);
      px = (maxX > minX) ? minX + Math.random() * (maxX - minX) : 30 + Math.random() * (W - pw - 60);
    } else {
      px = 30 + Math.random() * (W - pw - 60);
    }
    const plat = { x: px, y: wy, w: pw, h: 16, type: 'brick', prevX: px, prevY: wy, dx: 0, dy: 0 };
    plat.moveType = Math.random() < 0.5 ? 'horizontal' : 'vertical';
    plat.moveSpeed = 0.4 + Math.random() * 1.2;
    plat.moveRange = 30 + Math.random() * 80;
    plat.movePhase = Math.random() * Math.PI * 2;
    plat.originX = px;
    plat.originY = wy;
    platforms.push(plat);
    levelPlatforms.push(plat);

    const mysteryCount = platforms.filter(p => p.type === 'mystery').length;
    if (Math.random() < 0.5 && mysteryCount < 50) {
      const pw2 = 80 + Math.random() * 100;
      let px2;
      if (prevPlatforms.length > 0) {
        const ref = prevPlatforms[Math.floor(Math.random() * prevPlatforms.length)];
        const refCx = ref.x + ref.w / 2, halfPw2 = pw2 / 2;
        const minX = Math.max(30, refCx - horizontalReach - halfPw2);
        const maxX = Math.min(W - pw2 - 30, refCx + horizontalReach - halfPw2);
        px2 = (maxX > minX) ? minX + Math.random() * (maxX - minX) : 30 + Math.random() * (W - pw2 - 60);
      } else {
        px2 = 30 + Math.random() * (W - pw2 - 60);
      }
      platforms.push({ x: px2, y: wy - 15 + Math.random() * 25, w: pw2, h: 16, type: 'mystery' });
      levelPlatforms.push(plat);
    }

    if (Math.random() < 0.6) {
      coins.push({ x: 80 + Math.random() * (W - 160), y: wy - 25 + Math.random() * 20, r: 8, collected: false });
    }
    // Cloud platform (steppable, lasts 0.5s)
    if (Math.random() < 0.35) {
      const cw = 80 + Math.random() * 100;
      const cx = 30 + Math.random() * (W - cw - 60);
      platforms.push({ x: cx, y: wy - 30 - Math.random() * 40, w: cw, h: 20, type: 'cloud', cloudTimer: 0, damaged: false });
    }
    prevPlatforms = levelPlatforms;
  }
  for (let wy = startY; wy >= endY; wy -= 150) {
    if (Math.random() < 0.6) {
      clouds.push({ x: Math.random() * (W - 100), y: wy + Math.random() * 40, w: 60 + Math.random() * 50, h: 30 + Math.random() * 20 });
    }
  }
}

function initWorld() {
  platforms = []; coins = []; pipes = []; clouds = [];
  cameraY = 0; targetCameraY = 0; winner = null; winSoundPlayed = false; frame = 0;

  platforms.push({ x: 0, y: 460, w: W, h: 140, type: 'ground' });
  platforms.push({ x: 60, y: 380, w: 300, h: 16, type: 'brick' });
  platforms.push({ x: 420, y: 380, w: 300, h: 16, type: 'brick' });
  platforms.push({ x: 180, y: 290, w: 400, h: 16, type: 'mystery' });
  const goalY = currentWorld * 10000;
  // Goal platform
  platforms.push({ x: W/2 - 150, y: 460 - goalY, w: 300, h: 16, type: 'goal' });

  // Extra starting steps for world 2+
  if (currentWorld >= 2) {
    platforms.push({ x: 50, y: 190, w: 200, h: 16, type: 'brick' });
    platforms.push({ x: 380, y: 190, w: 200, h: 16, type: 'brick' });
    platforms.push({ x: 180, y: 90, w: 300, h: 16, type: 'mystery' });
    platforms.push({ x: 80, y: -10, w: 180, h: 16, type: 'brick' });
    platforms.push({ x: 380, y: -10, w: 180, h: 16, type: 'brick' });
  }

  generateWorld(currentWorld >= 2 ? -110 : 280, 460 - goalY);

  // Random pipe placement throughout the world
  // Random 1-3 pipes
  const pipeCount = 3;
  const pipeCandidates = platforms.filter(p => p.type !== 'ground' && p.type !== 'goal').sort(() => Math.random() - 0.5).slice(0, pipeCount);
  const pipePlats = pipeCandidates.sort((a, b) => b.y - a.y); // descending y: lowest first (1→2→3)
  // Pipe chain: 1→2→3→2 (low→mid→high→mid)
  for (let i = 0; i < pipePlats.length; i++) {
    const pp = pipePlats[i];
    let tx, ty;
    if (pipePlats.length >= 3) {
      const targets = [1, 2, 1];
      const ti = targets[i];
      tx = pipePlats[ti].x + pipePlats[ti].w / 2;
      ty = pipePlats[ti].y;
    } else if (pipePlats.length === 2) {
      const ti = (i + 1) % 2;
      tx = pipePlats[ti].x + pipePlats[ti].w / 2;
      ty = pipePlats[ti].y;
    } else {
      tx = 200 + Math.random() * 400;
      ty = pp.y - 2000 - Math.random() * 3000;
    }
    const pipeX = pp.x + pp.w / 2 - 16;
    pipes.push({ x: pipeX, y: pp.y, w: 32, h: 40, warp: true, targetX: tx, targetY: ty });
  }
}

function updateBird(bird, ctrl) {
  let spd = MOVE_SPEED * (bird.spd || 1);
  if (ctrl.left) bird.vx = -spd;
  else if (ctrl.right) bird.vx = spd;
  else bird.vx *= (bird.fric || 0.8);

  // SuperFlight: p1 bird flies freely
  if (hasSuperFlight && (bird.controller === 'p1' || (grayBirdPlayer && bird === grayBird))) {
    bird.vy = 0;
    if (ctrl.jump) bird.vy = -MOVE_SPEED * 1.5;
    else if (ctrl.down) bird.vy = MOVE_SPEED * 1.5;
  } else {
    bird.vy += GRAVITY * (bird.grav || 1);
    if (bird.vy > MAX_FALL_SPEED) bird.vy = MAX_FALL_SPEED;
  }

  const prevY = bird.y;
  bird.x += bird.vx;
  bird.y += bird.vy;

  if (bird.x < 0) bird.x = 0;
  if (bird.x > W - BIRD_W) bird.x = W - BIRD_W;

  bird.onGround = false;
  bird.onPipe = null;
  let landedOnGround = false;
  for (const p of platforms) {
    if (bird.x + BIRD_W > p.x + 4 && bird.x < p.x + p.w - 4) {
      if (bird.vy >= 0 && prevY + BIRD_H <= p.y + 10 && bird.y + BIRD_H >= p.y) {
        bird.y = p.y - BIRD_H;
        bird.x += p.dx || 0; bird.y += p.dy || 0;
        bird.vy = 0;
        bird.onGround = true;
        if (p.type === 'ground') landedOnGround = true;
        if (p.type === 'mystery' && !bird.hasDoubleJump && (!p.damaged)) {
          bird.hasDoubleJump = true;
          bird.doubleJump = 300;
          bird.djCharges = 3;
        }
      }
    }
  }

  if (landedOnGround) bird.maxHeight = 0;

  for (const p of pipes) {
    const topX = p.x - 6, topY = p.y - 14, topW = p.w + 12;
    if (bird.x + BIRD_W > topX + 4 && bird.x < topX + topW - 4) {
      if (bird.vy >= 0 && prevY + BIRD_H <= topY + 10 && bird.y + BIRD_H >= topY) {
        bird.y = topY - BIRD_H;
        bird.x += p.dx || 0; bird.y += p.dy || 0;
        bird.vy = 0;
        bird.onGround = true;
        if (p.warp && (!p.damaged)) bird.onPipe = p;
      }
    }
  }

  // Don't jump if standing on a pipe and pressing down — warp takes priority
  if (ctrl.jump && bird.onGround && !(bird.onPipe && ctrl.down)) {
    bird.vy = JUMP_FORCE * (bird.jmp || 1);
    bird.onGround = false;
    bird.onPipe = null;
  }

  if (ctrl.jump && !bird.onGround && bird.hasDoubleJump && bird.djCharges > 0) {
    bird.vy = JUMP_FORCE * (bird.jmp || 1);
    bird.djCharges--;
    if (bird.djCharges <= 0) { bird.hasDoubleJump = false; bird.doubleJump = 0; }
  }

  if (ctrl.down && bird.onPipe && bird.onPipe.warp) {
    // Check target pipe still exists and isn't damaged
    const tp = pipes.find(p => Math.abs(p.x - bird.onPipe.targetX) < 20 && Math.abs(p.y - bird.onPipe.targetY) < 20);
    if (tp && (!tp.damaged || !bird.onPipe.damaged)) {
      bird.x = bird.onPipe.targetX;
      bird.y = bird.onPipe.targetY - 14 - BIRD_H - 8;
      bird.vy = 2;
    }
    bird.onPipe = null;
    bird.onGround = false;
  }

  const heightAboveGround = 460 - bird.y;
  if (heightAboveGround > bird.maxHeight) bird.maxHeight = heightAboveGround;
}

function update() {
  frame++;

  // Update moving platforms
  for (const p of platforms) {
    p.prevX = p.x; p.prevY = p.y;
    if (p.moveType) {
      p.movePhase += p.moveSpeed * 0.02;
      const offset = Math.sin(p.movePhase) * p.moveRange;
      if (p.moveType === 'horizontal') p.x = p.originX + offset;
      else p.y = p.originY + offset;
    }
    p.dx = p.x - p.prevX; p.dy = p.y - p.prevY;
  }

  const ctrl = { left: keys['ArrowLeft'], right: keys['ArrowRight'], jump: keys['ArrowUp'], down: keys['ArrowDown'] };

  function aiCtrl(bird) {
    const b = { left: false, right: false, jump: false, down: false };
    const cx = bird.x + BIRD_W / 2;
    const cy = bird.y + BIRD_H;
    const drift = bird.drift || 0;
    const hop = bird.hop || 0;

    // Find platforms above and nearby
    let bestPlat = null, bestDist = Infinity;
    for (const p of platforms) {
      if (p.y >= bird.y - 10) continue;
      const dx = (p.x + p.w / 2) - cx;
      const dy = bird.y - p.y;
      const dist = Math.abs(dx) + dy * 0.3;
      if (dist < bestDist && dy < 600) { bestDist = dist; bestPlat = p; }
    }

    // Find coins
    let bestCoin = null, coinDist = Infinity;
    for (const c of coins) {
      const dx = c.x - cx;
      const dy = bird.y - (c.y - 10);
      if (Math.abs(dy) > 300) continue;
      const dist = Math.abs(dx) + Math.abs(dy) * 0.5;
      if (dist < coinDist) { coinDist = dist; bestCoin = c; }
    }

    // Horizontal: drift instinct + platform/coin seeking
    let targetDX = drift * 40;
    if (bestCoin && coinDist < 200) targetDX = bestCoin.x - cx;
    else if (bestPlat) targetDX = (bestPlat.x + bestPlat.w/2) - cx;

    if (targetDX > 8) b.right = true;
    else if (targetDX < -8) b.left = true;
    else if (Math.random() < Math.abs(drift) * 0.4) {
      if (drift > 0) b.right = true; else b.left = true;
    }

    // Jump: instinct hop + platform seeking
    if (bird.onGround) {
      const wantJump = Math.random() < hop * 1.5;
      const needJump = bestPlat && (bestPlat.y < bird.y - 30) && Math.abs((bestPlat.x + bestPlat.w/2) - cx) < 200;
      if (wantJump || needJump) b.jump = true;
    }

    // Pipe warp
    if (bird.onPipe && bird.onPipe.warp) {
      const gain = bird.y - bird.onPipe.targetY;
      if (gain > 80 || (gain > 20 && Math.random() < 0.4)) b.down = true;
    }

    return b;
  }

  function getCtrl(bird) {
    if (bird === p1Bird) return ctrl;
    if (bird === grayBird && grayBirdPlayer) return ctrl;
    return aiCtrl(bird);
  }

  for (const b of getAllBirds()) { const c = getCtrl(b); b.lastCtrl = c; updateBird(b, c); }
  if (grayBird && grayBirdPlayer) { const c = getCtrl(grayBird); grayBird.lastCtrl = c; updateBird(grayBird, c); }

  // Double-jump timer
  const djbirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of djbirds) {
    if (b.hasDoubleJump && b.doubleJump > 0) {
      b.doubleJump--;
      if (b.doubleJump <= 0) { b.hasDoubleJump = false; b.djCharges = 0; }
    }
  }

  // Spectate timer
  if (spectateTimer > 0) {
    spectateTimer--;
    if (spectateTimer <= 0) spectateBird = null;
  }

  // Camera
  let camTargetY;
  if (spectateBird) camTargetY = spectateBird.y;
  else if (p1Bird) camTargetY = p1Bird.y;
  else if (grayBird && grayBirdPlayer) camTargetY = grayBird.y;
  else camTargetY = Math.min(...getAllBirds().map(b => b.y));
  cameraY = camTargetY - H / 2;

  // Fallen into void
  for (const b of getAllBirds()) {
    if (b.y > 800) { gameState = 'over'; winner = getHighestBird([b]); break; }
  }
  if (grayBird && grayBird.y > 800) {
    if (grayBirdPlayer) {
      // Player gray bird fell = game over
      gameState = 'over';
      const racers = getAllBirds();
      winner = racers.reduce((a, b) => (b.maxHeight > a.maxHeight ? b : a), racers[0]);
    } else {
      // AI gray bird fell, respawn after 3 seconds
      grayBird = null; grayBirdRespawn = 30;
    }
  }
  if (grayBirdRespawn > 0) {
    grayBirdRespawn--;
    if (grayBirdRespawn <= 0 && gameState === 'playing') spawnGrayBird();
  }

  // Win condition: reach goal height
  const goal = currentWorld * 10000;
  const allRacers = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of allRacers) {
    if (b.maxHeight >= goal) {
      const isPlayer = (b === p1Bird) || (b === grayBird && grayBirdPlayer);
      if (currentWorld < WORLD_COUNT && isWorldUnlocked(currentWorld + 1) && isPlayer) {
        // Portal easter egg — only when player reaches the goal
        totalCoins += currentWorld * 100;
        localStorage.setItem('superBirdsTotalCoins', totalCoins);
        portalNextWorld = currentWorld + 1;
        portalBirdName = b.name;
        portalBirdColor = b.color;
        portalSpinTimer = (currentWorld === 1) ? 360 : (currentWorld === 2) ? 600 : 360;
        cameraSoundPlayed = false;
        // Capture victory photo for the camera easter egg
        try {
          victoryPhoto = new Image();
          victoryPhoto.src = canvas.toDataURL('image/png');
        } catch(e) { victoryPhoto = null; }
        gameState = 'portalSpin';
      } else {
        gameState = 'over';
        winner = b;
        for (const b2 of allRacers) {
          if (b2.maxHeight > winner.maxHeight) winner = b2;
        }
      }
      break;
    }
  }

  // Coin magnet: attract coins to birds with magnet power-up
  const magnetBirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const c of coins) {
    if (c.collected) continue;
    for (const b of magnetBirds) {
      continue;
      const cx = b.x + (b === grayBird ? 18 : BIRD_W/2);
      const cy = b.y + (b === grayBird ? 16 : BIRD_H/2);
      const dx = cx - c.x;
      const dy = cy - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200 && dist > 5) {
        c.x += (dx / dist) * 6;
        c.y += (dy / dist) * 6;
        break;
      }
    }
  }

  // Coin Magnet: attract nearby coins to p1 bird
  if (coinMagnet && (p1Bird || (grayBirdPlayer && grayBird))) {
    const magnetBird = p1Bird || grayBird;
    for (const c of coins) {
      if (c.collected) continue;
      const dx = (magnetBird.x + BIRD_W/2) - c.x;
      const dy = (magnetBird.y + BIRD_H/2) - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0 && dist < 200) {
        const speed = 3 + (200 - dist) / 20;
        c.x += (dx / dist) * speed;
        c.y += (dy / dist) * speed;
      }
    }
  }

  // Collect coins
  const coinBirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const c of coins) {
    if (c.collected) continue;
    for (const b of coinBirds) {
      if (b.x + BIRD_W > c.x - c.r && b.x < c.x + c.r &&
          b.y + BIRD_H > c.y - c.r && b.y < c.y + c.r) {
        c.collected = true; b.coins++; if (b === p1Bird || (grayBirdPlayer && b === grayBird)) { totalCoins++; localStorage.setItem('superBirdsTotalCoins', totalCoins); } coinDing(); break;
      }
    }
  }

  // Pipe collision
  for (const p of pipes) {
    if (p.damaged) continue;
    for (const b of coinBirds) {
      if (b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
          b.y + BIRD_H > p.y - 12 && b.y < p.y + p.h - 4) {
        if (b.x + BIRD_W/2 < p.x + p.w/2) b.x = p.x - BIRD_W;
        else b.x = p.x + p.w;
      }
    }
  }

  // Generate more world
  const minWorldY = cameraY - 600;
  const lowestPlatform = platforms.reduce((min, p) => Math.min(min, p.y), Infinity);
  if (lowestPlatform > minWorldY + 200) {
    generateWorld(lowestPlatform - PLATFORM_SPACING, Math.max(minWorldY, 460 - currentWorld * 10000));
  }

  // Platforms never disappear — only trim if memory cap exceeded
  const maxPlatforms = currentWorld * 250;
  if (platforms.length > maxPlatforms) {
    const groundPlat = platforms.find(p => p.type === 'ground');
    const goalPlat2 = platforms.find(p => p.type === 'goal');
    platforms.sort((a, b) => a.y - b.y);
    platforms.length = maxPlatforms;
    if (groundPlat && !platforms.includes(groundPlat)) platforms.push(groundPlat);
    if (goalPlat2 && !platforms.includes(goalPlat2)) platforms.push(goalPlat2);
  }
  // Spawn gray bird on game start
  if (!grayBird && grayBirdRespawn <= 0) {
    if (grayBirdPlayer) {
      // Player gray bird spawns at a visible position
      const gspd2 = Math.max(0.5, 1.8 - (currentWorld - 1) * 0.3);
      grayBird = { name: 'gray', color: '#999999', x: W/2 - 18, y: cameraY + H * 0.4, vx: 0, vy: 0, wingFrame: 0, maxHeight: 0, coins: 0, onGround: false, hasDoubleJump: false, doubleJump: 0, djCharges: 0, spd: gspd2, jmp: 1, grav: 1, fric: 0.8, controller: 'p1' };
    } else {
      spawnGrayBird();
    }
  }

  // Update AI gray bird (skip if player is gray bird)
  if (!grayBirdPlayer) updateGrayBird();

  // Damaged platforms: birds can only stand for 1 second (60 frames)
  // Gray bird player is immune to damaged platforms
  const allStanders = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of allStanders) {
    if (b === grayBird && grayBirdPlayer) continue; // gray bird player immune
    if (b.onGround) {
      const plat = platforms.find(p =>
        p.damaged &&
        b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
        Math.abs((b.y + BIRD_H) - p.y) < 5
      );
      if (plat) {
        b.standTimer = (b.standTimer || 0) + 1;
        if (b.standTimer >= (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird)) ? 120 : 60)) {
          // Platform breaks! Remove it
          const idx = platforms.indexOf(plat);
          if (idx >= 0) platforms.splice(idx, 1);
          b.standTimer = 0;
          b.onGround = false;
          b.vy = 2;
        }
      } else {
        b.standTimer = 0;
      }
    } else {
      b.standTimer = 0;
    }
    // Damaged pipes: stand for 2 seconds (120 frames) then break
    if (b.onGround) {
      const dpipe = pipes.find(p =>
        p.damaged &&
        b.x + BIRD_W > p.x - 6 && b.x < p.x + p.w + 6 &&
        Math.abs((b.y + BIRD_H) - (p.y - 14)) < 5
      );
      if (dpipe) {
        b.pipeStandTimer = (b.pipeStandTimer || 0) + 1;
        if (b.pipeStandTimer >= (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird)) ? 240 : 120)) {
          const idx = pipes.indexOf(dpipe);
          if (idx >= 0) pipes.splice(idx, 1);
          b.pipeStandTimer = 0;
          b.onGround = false;
          b.vy = 2;
        }
      } else {
        b.pipeStandTimer = 0;
      }
    } else {
      b.pipeStandTimer = 0;
    }

    // Cloud platform stand timer
    if (b.onGround) {
      const cloudPlat = platforms.find(p =>
        p.type === 'cloud' &&
        b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
        Math.abs((b.y + BIRD_H) - p.y) < 5
      );
      if (cloudPlat) {
        cloudPlat.cloudTimer = (cloudPlat.cloudTimer || 0) + 1;
        const anyDT = allStanders.some(s => s.onGround && s !== grayBird &&
          s.x + BIRD_W > cloudPlat.x + 4 && s.x < cloudPlat.x + cloudPlat.w - 4 &&
          Math.abs((s.y + BIRD_H) - cloudPlat.y) < 5);
        const ctMult = anyDT ? 2 : 1;
        const dtMult = (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird))) ? 2 : 1;
        if (cloudPlat.cloudTimer >= (cloudPlat.damaged ? 6 : 30) * ctMult * dtMult) {
          const idx = platforms.indexOf(cloudPlat);
          if (idx >= 0) platforms.splice(idx, 1);
          b.onGround = false;
          b.vy = 2;
        }
      }
    }
  }

  // Reset cloud timers for clouds not stood on
  const stoodClouds = new Set();
  for (const b of allStanders) {
    if (b.onGround) {
      const cp = platforms.find(p => p.type === 'cloud' && Math.abs((b.y + BIRD_H) - p.y) < 5);
      if (cp) stoodClouds.add(cp);
    }
  }
  for (const p of platforms) {
    if (p.type === 'cloud' && !stoodClouds.has(p)) p.cloudTimer = 0;
  }
  for (let i = coins.length - 1; i >= 0; i--) {
    if (coins[i].collected) coins.splice(i, 1);
  }
  const cloudCleanupY = cameraY + H + 3000;
  for (let i = clouds.length - 1; i >= 0; i--) {
    if (clouds[i].y >= cloudCleanupY) clouds.splice(i, 1);
  }
  // Hint trigger tracking
  const pb = getPlayerBird();
  if (pb) {
    if (!hintFirstJumpDone && !pb.onGround && pb.vy < -3) hintFirstJumpDone = true;
    if (!hintFirstLandDone && pb.onGround && pb.maxHeight > 10) {
      for (const p of platforms) {
        if (p.type !== 'ground' && pb.x + BIRD_W > p.x + 4 && pb.x < p.x + p.w - 4 && Math.abs((pb.y + BIRD_H) - p.y) < 5) {
          hintFirstLandDone = true; break;
        }
      }
    }
    if (!hintFirstCoinDone && pb.coins > 0) hintFirstCoinDone = true;
    if (!hintFirstGrayDamage && grayBird && !grayBirdPlayer) {
      for (const p of platforms) { if (p.damaged && Math.abs(p.y - pb.y) < 200) { hintFirstGrayDamage = true; break; } }
    }
    if (!hintFirstCompete) {
      for (const b2 of getAllBirds()) {
        if (b2 !== pb && b2.standTimer > 0 && Math.abs(b2.y - pb.y) < 20) { hintFirstCompete = true; break; }
      }
    }
  }
}

function getHighestBird(exclude) {
  let best = null;
  for (const b of getAllBirds()) {
    if (exclude && exclude.includes(b)) continue;
    if (!best || b.maxHeight > best.maxHeight) best = b;
  }
  return best;
}

function isCP(a, b) {
  if (!a || !b) return false;
  if ((a.name === '小蓝' && b.name === '小绿') || (a.name === '小绿' && b.name === '小蓝')) return true;
  if ((a.name === '小蓝莓' && b.name === '小芒果') || (a.name === '小芒果' && b.name === '小蓝莓')) return true;
  if ((a.name === '白白' && b.name === '蓝蓝') || (a.name === '蓝蓝' && b.name === '白白')) return true;
  return false;
}

function getWinTag(bird) {
  if (!bird || !winner) return '';
  if (winner === bird) {
    if (bird.controller === 'p1') return t('tag_you_win');
    if (p1Bird && isCP(bird, p1Bird)) return t('tag_cp_win');
    return t('tag_opp_win');
  }
  return '';
}

function getHoliday() {
  const now = new Date();
  const m = now.getMonth() + 1, d = now.getDate();
  if (m === 12 && d === 25) return 'christmas';
  if (m === 10 && d === 31) return 'halloween';
  if (m === 12 && d === 22) return 'dongzhi';       // Winter Solstice
  if (m === 1 && d === 1) return 'yuandan';          // New Year
  if (m === 1 && d === 7) return 'laba';             // Laba (lunar 12/8 approx)
  if (m === 2 && d === 10) return 'cny';             // Spring Festival (lunar 1/1 approx)
  if (m === 2 && d === 15) return 'yuanxiao';        // Lantern (lunar 1/15 approx)
  if (m === 2 && d === 14) return 'valentine';
  if (m === 4 && d === 12) return 'easter';          // Easter Sunday (approx)
  if (m === 4 && d === 5) return 'qingming';         // Tomb Sweeping
  if (m === 6 && d === 19) return 'dragonboat';      // Dragon Boat (lunar 5/5 approx)
  if (m === 8 && d === 25) return 'qixi';            // Double Seventh (lunar 7/7 approx)
  if (m === 10 && d === 1) return 'guoqing';         // National Day
  if (m === 9 && d === 29) return 'midautumn';       // Mid-Autumn (lunar 8/15 approx)
  if (m === 10 && d === 23) return 'chongyang';      // Double Ninth (lunar 9/9 approx)
  if (m === 12 || m === 1 || m === 2) return 'winter';
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  return 'autumn';
}

      ctx.beginPath(); ctx.arc(hx, hy, 70 + Math.sin(i) * 30, Math.PI, 0); ctx.fill();
    }
    const hill2 = holiday === 'winter' ? '#b8c8d8' : holiday === 'spring' ? '#48a838' : holiday === 'autumn' ? '#c89838' : '#48a838';
    ctx.fillStyle = hill2;
    for (let i = 0; i < 8; i++) {
      const bx = (i * 130 + ((cameraY * 0.5) % 130)) % (W + 100) - 50;
      const by = H - 60 + Math.cos(i) * 20;
      ctx.beginPath(); ctx.arc(bx, by, 25, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 20, by, 20, Math.PI, 0); ctx.fill();
    }
    // Winter snow on hills
    if (holiday === 'winter') {
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 15; i++) {
        const sx = ((i * 137 + frame * 0.15) % (W + 20)) - 10;
        const sy = ((i * 97 + frame * 0.3) % (H + 20)) - 10;
        ctx.fillRect(sx, sy, 2, 2);
      }
    }
    // Spring flowers
    if (holiday === 'spring') {
      for (let i = 0; i < 10; i++) {
        const fx = ((i * 97 + 20) % W), fy = H - 100 + (i * 31 % 40);
        ctx.fillStyle = ['#ff6666', '#ffaa44', '#ffdd00', '#ff66aa'][i % 4];
        ctx.fillRect(fx - 2, fy - 2, 4, 4);
      }
    }
    // Autumn leaves
    if (holiday === 'autumn') {
      for (let i = 0; i < 12; i++) {
        const lx = ((i * 83 + frame * 0.1) % (W + 20)) - 10;
        const ly = ((i * 67 + frame * 0.08) % (H + 20)) - 10;
        ctx.fillStyle = ['#cc4400', '#ff8800', '#dd6600', '#ffaa00'][i % 4];
        ctx.fillRect(lx, ly, 3, 3);
      }
    }
  }
}

function drawHudPanel(x, y, w, h, bird, tagColor) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = tagColor;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Portal spin screen
  if (gameState === 'portalSpin') {
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0, 0, W, H);

    // Swirling portal vortex
    const cx = W/2, cy = H/2 - 30;
    const spinAngle = (portalSpinTimer / 360) * Math.PI * 4;
    ctx.save(); ctx.translate(cx, cy);

    // Outer rings
    for (let r = 0; r < 6; r++) {
      const ringR = 40 + r * 35;
      const alpha = 0.3 - r * 0.04;
      ctx.strokeStyle = 'rgba(100,180,255,' + alpha + ')';
      ctx.lineWidth = 2 + r;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, spinAngle + r * 0.5, spinAngle + r * 0.5 + Math.PI * 1.5);
      ctx.stroke();
    }

    // Spinning bird at center (player's actual bird)
    const birdAngle = spinAngle * 3;
    ctx.save();
    ctx.rotate(birdAngle);
    const bs = 3;
    const bx2 = -18*bs/2, by2 = -32*bs/2;
    if (portalBirdName === 'gray') {
      // Gray bird special rendering
      ctx.fillStyle = '#999'; ctx.fillRect(bx2 + 36*bs*0.3, by2 + 32*bs*0.2, 36*bs*0.4, 32*bs*0.35);
      ctx.fillStyle = '#777'; ctx.fillRect(bx2 + 36*bs*0.6, by2 + 32*bs*0.15, 36*bs*0.25, 32*bs*0.25);
      ctx.fillStyle = '#fff'; ctx.fillRect(bx2 + 36*bs*0.64, by2 + 32*bs*0.18, 36*bs*0.10, 32*bs*0.10);
      ctx.fillStyle = '#000'; ctx.fillRect(bx2 + 36*bs*0.665, by2 + 32*bs*0.205, 36*bs*0.05, 32*bs*0.05);
      ctx.fillStyle = '#ff6600'; ctx.fillRect(bx2 + 36*bs*0.75, by2 + 32*bs*0.22, 36*bs*0.12, 32*bs*0.06);
      ctx.fillStyle = '#888'; ctx.fillRect(bx2 + 36*bs*0.42, by2 + 32*bs*0.02, 36*bs*0.16, 32*bs*0.22);
      ctx.fillStyle = '#777'; ctx.fillRect(bx2 + 36*bs*0.2, by2 + 32*bs*0.3, 36*bs*0.2, 32*bs*0.2);
    } else {
      const bc = portalBirdColor || '#ffdd00';
      // Head
      ctx.fillStyle = bc; ctx.fillRect(bx2 + 36*bs*0.6, by2 + 32*bs*0.15, 36*bs*0.25, 32*bs*0.25);
      ctx.fillStyle = '#fff'; ctx.fillRect(bx2 + 36*bs*0.64, by2 + 32*bs*0.18, 36*bs*0.10, 32*bs*0.10);
      ctx.fillStyle = '#000'; ctx.fillRect(bx2 + 36*bs*0.665, by2 + 32*bs*0.205, 36*bs*0.05, 32*bs*0.05);
      ctx.fillStyle = '#ffaa00'; ctx.fillRect(bx2 + 36*bs*0.75, by2 + 32*bs*0.22, 36*bs*0.12, 32*bs*0.06);
      // Body
      ctx.fillStyle = bc; ctx.fillRect(bx2 + 36*bs*0.3, by2 + 32*bs*0.2, 36*bs*0.4, 32*bs*0.35);
      // Wing
      ctx.fillStyle = bc; ctx.fillRect(bx2 + 36*bs*0.42, by2 + 32*bs*0.02, 36*bs*0.16, 32*bs*0.22);
      ctx.fillStyle = bc; ctx.fillRect(bx2 + 36*bs*0.2, by2 + 32*bs*0.3, 36*bs*0.2, 32*bs*0.2);
    }
    ctx.restore();

    ctx.restore();

    // +100 coins + bird name
    const coinAlpha = portalSpinTimer > 240 ? 1 : (portalSpinTimer / 240);
    ctx.fillStyle = 'rgba(255,221,0,' + coinAlpha + ')'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText('+100 💰', W/2, H/2 + 120);

    // Bird name spinning in
    const birdDisplayName = portalBirdName === 'gray' ? t('bird_gray') : bn({name: portalBirdName || ''});
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px "Courier New"';
    ctx.fillText(birdDisplayName + ' ' + t('portal_label'), W/2, H/2 + 155);

    // Destination
    const destName = portalNextWorld > 0 ? t('world_' + WORLD_TKEY[portalNextWorld-1] + '_name') : '';
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('→ ' + destName, W/2, H/2 + 182);

    // Camera FX: photo snap → zoom into portal
    if (portalSpinTimer > 200) {
      // Phase 1: camera flash + shutter
      const flashAlpha = portalSpinTimer > 320 ? Math.min(1, (portalSpinTimer - 320) / 24) : 0;
      if (flashAlpha > 0) {
        ctx.fillStyle = 'rgba(255,255,255,' + (flashAlpha * 0.75) + ')';
        ctx.fillRect(0, 0, W, H);
      }
      // Camera emoji
      ctx.fillStyle = '#fff'; ctx.font = 'bold 60px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('📸', W/2, H/2 - 40);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, H/2 - 8, W, 16);
      ctx.fillRect(0, H/2 - 60, W, 8);
      ctx.fillRect(0, H/2 + 52, W, 8);
    } else if (portalSpinTimer > 80 && victoryPhoto && victoryPhoto.complete && victoryPhoto.naturalWidth > 0) {
      // Phase 2: photo zooms into portal
      const zoomProgress = (200 - portalSpinTimer) / 120;
      const scale = 1 + zoomProgress * 3;
      ctx.save();
      ctx.translate(W/2, H/2 - 30);
      ctx.scale(scale, scale);
      ctx.translate(-W/2, -(H/2 - 30));
      ctx.drawImage(victoryPhoto, 0, 0, W, H);
      ctx.restore();
      if (zoomProgress < 0.5) {
        ctx.fillStyle = 'rgba(0,0,0,' + ((1 - zoomProgress/0.5) * 0.3) + ')';
        ctx.fillRect(0, 0, W, H);
      }
    } else if (portalSpinTimer <= 80) {
      // Phase 3: portal vortex intensifies
      const cx = W/2, cy = H/2 - 30;
      const va = portalSpinTimer / 80;
      const vortexGlow = ctx.createRadialGradient(cx, cy, 10, cx, cy, 200);
      vortexGlow.addColorStop(0, 'rgba(255,255,255,' + va + ')');
      vortexGlow.addColorStop(0.4, 'rgba(150,200,255,' + (va*0.4) + ')');
      vortexGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vortexGlow;
      ctx.fillRect(cx - 200, cy - 200, 400, 400);
      const vigAlpha = 1 - va;
      if (vigAlpha > 0) {
        const vig = ctx.createRadialGradient(cx, cy, 80, cx, cy, 500);
        vig.addColorStop(0, 'rgba(0,0,0,0)');
        vig.addColorStop(1, 'rgba(0,0,0,' + vigAlpha + ')');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, W, H);
      }
    }

    return;
  }

  // World loading screen
  if (gameState === 'worldLoading') {
    // Same style as game loading screen
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(1, '#98c8fc');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

    // Pixel clouds
    function drawWlCloud(cx, cy, cw, ch) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
      ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
      ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
      ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
    }
    drawWlCloud(50, 60, 120, 60);
    drawWlCloud(580, 40, 150, 70);
    drawWlCloud(300, 90, 100, 50);
    drawWlCloud(680, 120, 90, 45);

    // Green hills
    ctx.fillStyle = '#68b838';
    ctx.fillRect(0, H - 80, 200, 80);
    ctx.fillRect(20, H - 100, 40, 20);
    ctx.fillRect(60, H - 90, 30, 10);
    ctx.fillRect(200, H - 60, 250, 60);
    ctx.fillRect(220, H - 80, 50, 20);
    ctx.fillRect(300, H - 70, 35, 10);
    ctx.fillRect(450, H - 90, 200, 90);
    ctx.fillRect(480, H - 110, 45, 20);
    ctx.fillRect(550, H - 100, 35, 10);
    ctx.fillRect(650, H - 70, 180, 70);
    ctx.fillRect(680, H - 90, 40, 20);

    // White outline bird
    const gs2 = 3;
    const gx2 = W/2 - 18*gs2, gy2 = H/2 - 105;
    const bw2 = 36*gs2, bh2 = 32*gs2;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(gx2 + bw2*0.3, gy2 + bh2*0.2, bw2*0.4, bh2*0.35);
    ctx.strokeRect(gx2 + bw2*0.6, gy2 + bh2*0.15, bw2*0.25, bh2*0.25);
    ctx.strokeRect(gx2 + bw2*0.64, gy2 + bh2*0.18, bw2*0.10, bh2*0.10);
    ctx.strokeRect(gx2 + bw2*0.665, gy2 + bh2*0.205, bw2*0.05, bh2*0.05);
    ctx.strokeRect(gx2 + bw2*0.75, gy2 + bh2*0.22, bw2*0.12, bw2*0.06);
    const wingUp2 = frame % 20 < 10;
    if (wingUp2) ctx.strokeRect(gx2 + bw2*0.42, gy2 + bh2*0.02, bw2*0.16, bh2*0.22);
    else ctx.strokeRect(gx2 + bw2*0.38, gy2 + bh2*0.35, bw2*0.2, bh2*0.22);
    ctx.strokeRect(gx2 + bw2*0.2, gy2 + bh2*0.3, bw2*0.2, bh2*0.2);

    let barW2, barH2, barX2, barY2;
    // Victory photo from portal camera easter egg
    if (victoryPhoto && victoryPhoto.complete && victoryPhoto.naturalWidth > 0) {
      const frameStyles = [
        { outer: '#e8dcc8', inner: '#faf8f0', accent: '#b8a880', deco: '📷', title: 'W1' },
        { outer: '#cc2222', inner: '#ffeedd', accent: '#ffcc00', deco: '🧧', title: 'W2' },
        { outer: '#c89933', inner: '#fff8e0', accent: '#e8c840', deco: '🌙', title: 'W3' },
        { outer: '#dd4422', inner: '#fff2e8', accent: '#ffaa00', deco: '🏮', title: 'W4' },
        { outer: '#447744', inner: '#eeffee', accent: '#88cc88', deco: '🍃', title: 'W5' },
        { outer: '#996633', inner: '#fff8f0', accent: '#cc8844', deco: '🍚', title: 'W6' },
        { outer: '#115577', inner: '#e8f4ff', accent: '#33bb99', deco: '🐲', title: 'W7' },
        { outer: '#bb5599', inner: '#fff0f8', accent: '#ff77bb', deco: '💫', title: 'W8' },
        { outer: '#cc2222', inner: '#fff0e0', accent: '#ffdd00', deco: '🎉', title: 'W9' },
        { outer: '#cc7722', inner: '#fffaf0', accent: '#ffbb44', deco: '🏵️', title: 'W10' },
        { outer: '#5577aa', inner: '#eef6ff', accent: '#99bbdd', deco: '❄️', title: 'W11' },
      ];
      const fs = frameStyles[currentWorld - 1] || frameStyles[0];
      const pw = 220, ph = 140, px = W/2 - pw/2 - 10, py = H/2 - 80;
      // Outer frame
      ctx.fillStyle = fs.outer; ctx.fillRect(px - 12, py - 12, pw + 24, ph + 24);
      // Inner border
      ctx.fillStyle = fs.inner; ctx.fillRect(px - 4, py - 4, pw + 8, ph + 8);
      // Photo
      ctx.drawImage(victoryPhoto, px, py, pw, ph);
      // Accent corners
      ctx.fillStyle = fs.accent;
      ctx.fillRect(px - 12, py - 12, 14, 5); ctx.fillRect(px - 12, py - 12, 5, 14);
      ctx.fillRect(px + pw - 2, py - 12, 14, 5); ctx.fillRect(px + pw + 7, py - 12, 5, 14);
      ctx.fillRect(px - 12, py + ph + 7, 14, 5); ctx.fillRect(px - 12, py + ph - 9, 5, 14);
      ctx.fillRect(px + pw - 2, py + ph + 7, 14, 5); ctx.fillRect(px + pw + 7, py + ph - 9, 5, 14);
      // Label
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(fs.deco + ' ' + fs.title + ' · ' + t('loading_title'), W/2, py + ph + 22);
      // Loading bar
      barW2 = 600; barH2 = 16; barX2 = W/2 - barW2/2; barY2 = py + ph + 38;
    } else {
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('loading_title'), W/2, H/2 + 20);
      barW2 = 600; barH2 = 16; barX2 = W/2 - barW2/2; barY2 = H/2 + 50;
    }
    const progress2 = 1 - (worldLoadingTimer / 90);
    ctx.fillStyle = '#333'; ctx.fillRect(barX2, barY2, barW2, barH2);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(barX2, barY2, barW2, barH2);
    ctx.fillStyle = '#ffdd00'; ctx.fillRect(barX2, barY2, Math.ceil(barW2 * progress2), barH2);

		ctx.fillStyle = '#aaa'; ctx.font = '13px "Courier New"';
    ctx.fillText(t('loading_text'), W/2, barY2 - 10);
		ctx.fillStyle = '#555'; ctx.font = '9px "Courier New"';
		ctx.fillText('v2026.07.05', W/2, H - 24);

    return;
  }

  // Loading screen
  if (gameState === 'loading') {
    // 超级玛丽式蓝天背景
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(1, '#98c8fc');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // 像素白云
    function drawLoadingCloud(cx, cy, cw, ch) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
      ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
      ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
      ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
    }
    drawLoadingCloud(50, 60, 120, 60);
    drawLoadingCloud(580, 40, 150, 70);
    drawLoadingCloud(300, 90, 100, 50);
    drawLoadingCloud(680, 120, 90, 45);

    // 绿色像素小山丘
    ctx.fillStyle = '#68b838';
    ctx.fillRect(0, H - 80, 200, 80);
    ctx.fillRect(20, H - 100, 40, 20);
    ctx.fillRect(60, H - 90, 30, 10);
    ctx.fillRect(200, H - 60, 250, 60);
    ctx.fillRect(220, H - 80, 50, 20);
    ctx.fillRect(300, H - 70, 35, 10);
    ctx.fillRect(450, H - 90, 200, 90);
    ctx.fillRect(480, H - 110, 45, 20);
    ctx.fillRect(550, H - 100, 35, 10);
    ctx.fillRect(650, H - 70, 180, 70);
    ctx.fillRect(680, H - 90, 40, 20);

    // 白色边框小鸟
    const gs = 3;
    const gx = W/2 - 18*gs, gy = H/2 - 105;
    const bw = 36*gs, bh = 32*gs;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    // Body outline
    ctx.strokeRect(gx + bw*0.3, gy + bh*0.2, bw*0.4, bh*0.35);
    // Head outline
    ctx.strokeRect(gx + bw*0.6, gy + bh*0.15, bw*0.25, bh*0.25);
    // Eye (just white border, no fill)
    ctx.strokeRect(gx + bw*0.64, gy + bh*0.18, bw*0.10, bh*0.10);
    // Pupil (small white dot outline)
    ctx.strokeRect(gx + bw*0.665, gy + bh*0.205, bw*0.05, bh*0.05);
    // Beak
    ctx.strokeRect(gx + bw*0.75, gy + bh*0.22, bw*0.12, bw*0.06);
    // Wing (animated)
    const wingUp = frame % 20 < 10;
    if (wingUp) ctx.strokeRect(gx + bw*0.42, gy + bh*0.02, bw*0.16, bh*0.22);
    else ctx.strokeRect(gx + bw*0.38, gy + bh*0.35, bw*0.2, bh*0.22);
    // Tail
    ctx.strokeRect(gx + bw*0.2, gy + bh*0.3, bw*0.2, bh*0.2);
    // Title
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t('loading_title'), W/2, H/2 + 20);

    // Loading bar
    const barW = 600, barH = 16, barX = W/2 - barW/2, barY = H/2 + 50;
    const progress = Math.min(1, frame / 120);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(barX, barY, Math.ceil(barW * progress), barH);

    // Loading text
    ctx.fillStyle = '#aaa';
    ctx.font = '13px "Courier New"';
    ctx.fillText(t('loading_text'), W/2, barY - 10);

    // Version
    ctx.fillStyle = '#555';
    ctx.font = '9px "Courier New"';
    ctx.fillText('v2026.07.05', W/2, H - 24);

    return;
  }

  // Snow screen after character selection
  if (gameState === 'snow') {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    const snowColors = ['#ff4444','#ff8800','#ffdd00','#44ff44','#4488ff','#aa44ff','#ff44aa','#44ffff'];
    for (let i = 0; i < 80; i++) {
      const seed = i * 137.5 + frame * 0.6;
      const sx = ((seed * 73 + i * 17) % W + W) % W;
      const sy = ((seed * 97 + frame * 1.5 + i * 31) % (H + 60)) - 30;
      const size = 3 + ((i * 43) % 5);
      const alpha = 0.4 + 0.6 * Math.sin(frame * 0.05 + i);
      const colorIdx = Math.floor(((i * 29) % snowColors.length));
      ctx.fillStyle = snowColors[colorIdx];
      ctx.globalAlpha = alpha;
      ctx.fillRect(sx, sy, size, size);
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 32px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t('snow_ready'), W/2 + 10, H/2 - 10);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Courier New"';
    const countText = snowTimer > 90 ? '3' : snowTimer > 60 ? '2' : snowTimer > 30 ? '1' : t('snow_go');
    ctx.fillText(countText, W/2, H/2 + 40);

    return;
  }

  drawParallaxBg();

  ctx.save();
  ctx.translate(0, -cameraY);

  for (const c of clouds) {
    if (c.y > cameraY - 100 && c.y < cameraY + H + 100) drawCloud(c.x, c.y, c.w, c.h);
  }
  for (const p of pipes) {
    if (p.y > cameraY - 100 && p.y < cameraY + H + 100) {
      drawPipe(p.x, p.y, p.w, p.h, p.warp && !p.damaged);
      if (p.damaged) {
        ctx.fillStyle = 'rgba(255,0,0,0.35)';
        ctx.fillRect(p.x - 6, p.y - 14, p.w + 12, p.h + 14);
        ctx.fillStyle = '#ff3333'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText('⚠', p.x + p.w/2, p.y - 16);
      }
    }
  }
  for (const p of platforms) {
    if (p.y > cameraY - 100 && p.y < cameraY + H + 100) {
      if (p.type === 'cloud') {
        // Draw cloud platform
        const cx = p.x, cy = p.y, cw = p.w, ch = p.h;
        ctx.fillStyle = p.damaged ? '#ccc' : '#ffffff';
        ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
        ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
        ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
        ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
        if (!p.damaged) {
          ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 1;
          ctx.strokeRect(cx, cy, cw, ch);
        }
        continue;
      }
      
      if (p.type === 'ground') drawGround(p.x, p.y, p.w, p.h);
      else if (p.type === 'mystery') drawMysteryBox(p.x, p.y, p.w, p.h, frame);

  }
  // Draw gray bird
  if (grayBird) drawGrayBird(grayBird);

  for (const c of coins) {
    if (c.collected) continue;
    if (c.y > cameraY - 50 && c.y < cameraY + H + 50) drawCoin(c.x, c.y, c.r, frame);

  // Goal flag / Portal
  const goalPlat = platforms.find(p => p.type === 'goal');
  if (goalPlat && goalPlat.y > cameraY - 100 && goalPlat.y < cameraY + H + 100) {
    const gx = goalPlat.x + goalPlat.w / 2, gy = goalPlat.y;

    if (showPortal) {

      ctx.save();
      const pr = 36;
      const glowA = 0.3 + Math.sin(frame * 0.05) * 0.15;
      const glowG = ctx.createRadialGradient(gx, gy - pr, pr * 0.3, gx, gy - pr, pr * 1.8);
      glowG.addColorStop(0, 'rgba(100,200,255,' + glowA + ')');

      ctx.fillStyle = glowG; ctx.fillRect(gx - pr*2, gy - pr*3, pr*4, pr*5);
      // Outer ring
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(gx, gy - pr, pr, 0, Math.PI * 2); ctx.stroke();

      ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(gx, gy - pr, pr * 0.55, 0, Math.PI * 2); ctx.stroke();
      // Center glow
      const inG = ctx.createRadialGradient(gx, gy - pr, 0, gx, gy - pr, pr * 0.5);
      inG.addColorStop(0, '#fff'); inG.addColorStop(0.3, '#aaddff'); inG.addColorStop(1, 'rgba(40,80,200,0)');
      ctx.fillStyle = inG; ctx.beginPath(); ctx.arc(gx, gy - pr, pr * 0.5, 0, Math.PI*2); ctx.fill();
      // Label
      ctx.fillStyle = '#aaddff'; ctx.font = 'bold 12px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(t('portal_label') + ' → ' + t('world_' + WORLD_TKEY[currentWorld] + '_name'), gx, gy + 14);

    } else {
      // Normal flag

      const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;

    // Virtual D-Pad (left side, mobile/tablet only)
    if (isMobile) {
      const dpCX = 84, dpCY = H - 70, dpS = 52, dpG = 2;

        { key: 'ArrowUp',    x: dpCX - dpS/2, y: dpCY - dpS - dpG, label: '▲' },

        { key: 'ArrowRight', x: dpCX + dpG + dpS/2, y: dpCY - dpS/2, label: '▶' },
      ];
      for (const btn of dpBtns) {

      ctx.fillStyle = '#777'; ctx.fillRect(flyX + bw2*0.6, flyY + bh2*0.15, bw2*0.25, bh2*0.25);
      ctx.fillStyle = '#fff'; ctx.fillRect(flyX + bw2*0.64, flyY + bh2*0.18, bw2*0.10, bh2*0.10);

      ctx.fillStyle = '#ff6600'; ctx.fillRect(flyX + bw2*0.75, flyY + bh2*0.22, bw2*0.12, bw2*0.06);

      if (wingUp) ctx.fillRect(flyX + bw2*0.42, flyY + bh2*0.02, bw2*0.16, bh2*0.22);

      ctx.fillStyle = '#777'; ctx.fillRect(flyX + bw2*0.2, flyY + bh2*0.3, bw2*0.2, bh2*0.2);

    if (showRules === 'text') {

    // Music popup

    // Dialogue popup

      } else {
        // Chat mode
        const isGroup = dialogueChar === 'group';

        const chatAreaX = dlgX + 14, chatAreaY = dlgY + 52, chatAreaW = dlgW - 28, chatAreaH = 310;
        const inputY = chatAreaY + chatAreaH + 8;

          const my2 = msgStartY + mi * 22;

          if (msg.who === 'system') {

            ctx.fillText('👤 ' + msg.text, chatAreaX + 8, my2);

        ctx.fillStyle = isListening ? '#ff4444' : '#6644aa'; ctx.fillRect(micX, micY, micW, micH);

        ctx.fillStyle = '#fff'; ctx.font = '20px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText('🎤', micX + micW/2, micY + 25);

	        // AI Settings button (top right, mirrors back button)
	        const gearW2 = 70, gearH2 = 26, gearX2 = dlgX + dlgW - gearW2 - 10, gearY2 = dlgY + 8;
	        ctx.fillStyle = showAiSettings ? '#cc5500' : '#2255aa';
	        ctx.fillRect(gearX2, gearY2, gearW2, gearH2);
	        ctx.fillStyle = showAiSettings ? '#ff8844' : '#4488cc';
	        ctx.fillRect(gearX2 + 2, gearY2 + 2, gearW2 - 4, gearH2 - 4);
	        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px "Courier New"'; ctx.textAlign = 'center';
	        ctx.fillText('⚙ AI', gearX2 + gearW2/2, gearY2 + 17);

	        // AI Settings panel
	        if (showAiSettings) {
	          const spW = 240, spH = 160, spX = W/2 - spW/2, spY = H/2 - spH/2;
	          ctx.fillStyle = 'rgba(20,20,50,0.97)'; ctx.fillRect(spX, spY, spW, spH);
	          ctx.strokeStyle = '#ff8844'; ctx.lineWidth = 2; ctx.strokeRect(spX, spY, spW, spH);
	          ctx.fillStyle = '#fff'; ctx.font = 'bold 15px "Courier New"'; ctx.textAlign = 'center';
	          ctx.fillText('AI Settings', spX + spW/2, spY + 28);
	          // Creativity slider
	          ctx.fillStyle = '#ccc'; ctx.font = '11px "Courier New"';
	          ctx.fillText('Creativity: ' + aiCreativity, spX + spW/2, spY + 56);
	          const sliderX = spX + 20, sliderW = spW - 40, sliderY = spY + 64;
	          ctx.fillStyle = '#333'; ctx.fillRect(sliderX, sliderY, sliderW, 8);
	          const knobX = sliderX + (aiCreativity / 100) * sliderW;
	          ctx.fillStyle = '#ff8844'; ctx.beginPath(); ctx.arc(knobX, sliderY + 4, 8, 0, Math.PI*2); ctx.fill();
	          ctx.fillStyle = '#999'; ctx.font = '9px "Courier New"';
	          ctx.fillText('Precise', spX + 40, sliderY + 30);
	          ctx.fillText('Creative', spX + spW - 40, sliderY + 30);
	          // Voice toggle
	          ctx.fillStyle = '#ccc'; ctx.font = '11px "Courier New"';
	          ctx.fillText('Voice: ' + (speechEnabled ? 'ON' : 'OFF'), spX + spW/2, spY + 110);
	          const toggleX = spX + spW/2 - 20, toggleY = spY + 114, toggleW = 40, toggleH = 20;
	          ctx.fillStyle = speechEnabled ? '#44aa44' : '#666'; ctx.fillRect(toggleX, toggleY, toggleW, toggleH);
	          ctx.fillStyle = '#fff'; ctx.font = '10px "Courier New"';
	          ctx.fillText(speechEnabled ? 'ON' : 'OFF', toggleX + toggleW/2, toggleY + 14);
	          // Close button
	          ctx.fillStyle = '#883366'; ctx.fillRect(spX + spW - 60, spY + 130, 50, 22);
	          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px "Courier New"'; ctx.fillText('Close', spX + spW - 35, spY + 145);
	        }
      }
    }
  }

  // Unlock celebration overlay
  // Shop
  if (gameState === 'shop') {
    ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 28px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('shop_title'), W/2, 50);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Courier New"';
    ctx.fillText(t('shop_balance') + totalCoins + t('shop_coins_unit'), W/2, 78);

    const shopBirds = [...getAllBirds(), { name: '小灰', color: '#888888', _isGray: true }];
    const shopCols = 4, shopRows = 2;
    const cellW = 170, cellH = 140;
    const startX = (W - shopCols * cellW) / 2, startY = 100;

    for (let i = 0; i < shopBirds.length; i++) {
      const b = shopBirds[i];
      const col = i % shopCols, row = Math.floor(i / shopCols);

      // Bird preview
      if (b._isGray) {
        // Mini gray bird
        const mix2 = sx + cellW/2 - 18, miy2 = sy + 20;

        ctx.fillStyle = '#999'; ctx.fillRect(mix2 + 36*0.3, miy2 + 32*0.2, 36*0.4, 32*0.35);
        ctx.fillStyle = '#777'; ctx.fillRect(mix2 + 36*0.6, miy2 + 32*0.15, 36*0.25, 32*0.25);
        ctx.fillStyle = '#fff'; ctx.fillRect(mix2 + 36*0.64, miy2 + 32*0.18, 36*0.10, 32*0.10);

        ctx.fillStyle = '#888';

        else ctx.fillRect(mix2 + 36*0.38, miy2 + 32*0.35, 36*0.2, 32*0.22);
        ctx.fillStyle = '#777'; ctx.fillRect(mix2 + 36*0.2, miy2 + 32*0.3, 36*0.2, 32*0.2);

        ctx.fillText(t('bird_gray'), sx + cellW/2, sy + 72);
      } else {
        drawBirdByType(b, sx + cellW/2 - BIRD_W*0.45, sy + 24, BIRD_W*0.9, BIRD_H*0.9, frame);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Courier New"';
        ctx.fillText(bn(b), sx + cellW/2, sy + 74);
      }

      // Price / Status
      const lockKey = b._isGray ? 'gray' : b.name;
      if (isLocked(lockKey)) {

  }

  // World Select
  // World Select
  if (gameState === 'worldSelect') {
    ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 28px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('world_select'), W/2, 40);

    const wsW = 230, wsH = 155, wsGap = 12;
    const wsCols = 3;
    const cardsPerPage = 6;
    const totalPages = Math.ceil(WORLD_COUNT / cardsPerPage);
    const startIdx = worldSelectPage * cardsPerPage;
    const shownWorlds = [];
    for (let w = 1; w <= WORLD_COUNT; w++) shownWorlds.push(w);
    const pageWorlds = shownWorlds.slice(startIdx, startIdx + cardsPerPage);
    const wsRows = Math.ceil(pageWorlds.length / wsCols);
    const wsGridW = wsW * Math.min(wsCols, pageWorlds.length) + wsGap * (Math.min(wsCols, pageWorlds.length) - 1);
    const wsStartX = W/2 - wsGridW / 2;
    const wsStartY = 70;

    // Sky preview colors for all themes
    const previewSkies = {
      spring:['#7ab868','#a8d888'], cny:['#3a1020','#5a2030'], midautumn:['#1a2040','#3a4060'],
      yuanxiao:['#2a1040','#4a2060'], qingming:['#88b8c8','#b8e8e8'], laba:['#c8a080','#e0c0a0'],
      dragonboat:['#3a6040','#5a9070'], qixi:['#1a2a50','#3a4a70'], guoqing:['#c83030','#e05050'],
      chongyang:['#e0a048','#f0c868'], dongzhi:['#d8d0e0','#e8e4f0']
    };
    const hillColors = { cny:'#c82020', midautumn:'#445566', yuanxiao:'#3a2050', qingming:'#88c8a8', laba:'#b89870', dragonboat:'#4a8a5a', qixi:'#1a2a50', guoqing:'#d83030', chongyang:'#e8c878', dongzhi:'#e8e4f0' };

    for (let i = 0; i < pageWorlds.length; i++) {
      const wId = pageWorlds[i];
      const col = i % wsCols, row = Math.floor(i / wsCols);
      const wx = wsStartX + col * (wsW + wsGap), wy = wsStartY + row * (wsH + wsGap);
      const sel = currentWorld === wId;
      const wTheme = WORLD_HOLIDAYS[wId-1];
      const wName = t('world_' + WORLD_TKEY[wId-1] + '_name');
      const wDesc = t('world_' + WORLD_TKEY[wId-1] + '_desc');

      // Card
      ctx.fillStyle = sel ? 'rgba(255,255,255,0.12)' : 'rgba(20,20,40,0.9)'; ctx.fillRect(wx, wy, wsW, wsH);
      ctx.strokeStyle = sel ? '#ffdd00' : '#44aaff'; ctx.lineWidth = sel ? 3 : 2; ctx.strokeRect(wx, wy, wsW, wsH);

      // Mini bg preview
      const ps = previewSkies[wTheme] || previewSkies.spring;
      const pGrad = ctx.createLinearGradient(0, wy + 30, 0, wy + wsH);
      pGrad.addColorStop(0, ps[0]); pGrad.addColorStop(1, ps[1]);
      ctx.fillStyle = pGrad; ctx.fillRect(wx + 2, wy + 30, wsW - 4, wsH - 60);

      // Small hills
      ctx.fillStyle = hillColors[wTheme] || '#68b838';
      ctx.beginPath(); ctx.arc(wx + wsW * 0.33, wy + wsH - 28, 35, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(wx + wsW * 0.67, wy + wsH - 32, 40, Math.PI, 0); ctx.fill();

      // Moon for midautumn
      if (wTheme === 'midautumn') {
        ctx.fillStyle = '#ffffcc'; ctx.beginPath(); ctx.arc(wx + wsW - 25, wy + 50, 18, 0, Math.PI * 2); ctx.fill();
      }

      // Name + desc
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(wName, wx + wsW/2, wy + 135);
      ctx.fillStyle = '#aaa'; ctx.font = '11px "Courier New"';
      ctx.fillText(wDesc, wx + wsW/2, wy + 152);

      // Current tag
      if (sel) {

    // Page navigation

      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Courier New"';
      ctx.fillText('◀', lx + lw/2, ly + 17);
    }
    if (startIdx + cardsPerPage < WORLD_COUNT) {
      const rx = W/2 + 19, ry = navY, rw = 36, rh = 24;
      ctx.fillStyle = '#555'; ctx.fillRect(rx, ry, rw, rh);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(rx, ry, rw, rh);

      ctx.fillText('▶', rx + rw/2, ry + 17);

    // Back button
    const wsBackW = 120, wsBackH = 36, wsBackX = W/2 - wsBackW/2, wsBackY = H - 56;
    ctx.fillStyle = '#555'; ctx.fillRect(wsBackX, wsBackY, wsBackW, wsBackH);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(wsBackX, wsBackY, wsBackW, wsBackH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('btn_back'), W/2, wsBackY + 24);
  }

  // Runner Game
  if (gameState === 'runner') {
    if (!runnerStarted) {
      // Card preview screen (like world select cards)
      ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 28px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('小鸟跑酷', W/2, 44);

      // Card
      const cardW = 280, cardH = 280, cardX = W/2 - cardW/2, cardY = 70;
      ctx.fillStyle = 'rgba(20,30,50,0.95)'; ctx.fillRect(cardX, cardY, cardW, cardH);
      ctx.strokeStyle = '#44aacc'; ctx.lineWidth = 3; ctx.strokeRect(cardX, cardY, cardW, cardH);

      // Sky preview inside card
      const pg = ctx.createLinearGradient(0, cardY + 10, 0, cardY + cardH - 60);
      pg.addColorStop(0, '#87CEEB'); pg.addColorStop(0.7, '#E0F0FF'); pg.addColorStop(1, '#90EE90');
      ctx.fillStyle = pg; ctx.fillRect(cardX + 4, cardY + 10, cardW - 8, cardH - 70);

      // Horizontal platforms in preview (like main game)
      ctx.fillStyle = '#8B5A2F';
      ctx.fillRect(cardX + 40, cardY + 170, 75, 10);
      ctx.fillStyle = '#A07040'; ctx.fillRect(cardX + 40, cardY + 170, 75, 3);
      ctx.fillStyle = '#8B5A2F';
      ctx.fillRect(cardX + 160, cardY + 130, 60, 10);
      ctx.fillStyle = '#A07040'; ctx.fillRect(cardX + 160, cardY + 130, 60, 3);
      ctx.fillStyle = '#8B5A2F';
      ctx.fillRect(cardX + 100, cardY + 210, 65, 10);
      ctx.fillStyle = '#A07040'; ctx.fillRect(cardX + 100, cardY + 210, 65, 3);

      // Animated bird on a platform in preview
      const pbx = cardX + 58, pby = cardY + 138;
      const pwu = frame % 20 < 10;
      ctx.fillStyle = '#ffdd00'; ctx.fillRect(pbx + 10, pby + 5, 18, 16);
      ctx.fillStyle = '#ffaa00'; ctx.fillRect(pbx + 14, pby, 10, 10);
      ctx.fillStyle = '#fff'; ctx.fillRect(pbx + 18, pby + 2, 4, 4);
      ctx.fillStyle = '#000'; ctx.fillRect(pbx + 19, pby + 3, 2, 2);
      ctx.fillStyle = '#ff6600'; ctx.fillRect(pbx + 24, pby + 4, 6, 3);
      ctx.fillStyle = '#eebb00';
      if (pwu) { ctx.fillRect(pbx + 3, pby + 2, 8, 12); }
      else { ctx.fillRect(pbx + 3, pby + 12, 8, 12); }

      // Game name below card
      ctx.fillStyle = '#fff'; ctx.font = 'bold 18px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('小鸟跑酷', W/2, cardY + cardH + 28);

      // Start hint
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 13px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('点击或按空格开始', W/2, cardY + cardH + 50);
    } else {
    // Sky background
    const rGrad = ctx.createLinearGradient(0, 0, 0, H);
    rGrad.addColorStop(0, '#87CEEB'); rGrad.addColorStop(0.7, '#E0F0FF'); rGrad.addColorStop(1, '#90EE90');
    ctx.fillStyle = rGrad; ctx.fillRect(0, 0, W, H);

    // Draw horizontal platforms
    ctx.fillStyle = '#8B5A2F';
    for (let pi = 0; pi < runnerPlatforms.length; pi++) {
