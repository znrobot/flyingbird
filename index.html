<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Birds</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameContainer { position: relative; image-rendering: pixelated; }
  canvas {
    display: block;
    border: 4px solid #555;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    color: white; font-size: 18px; font-weight: bold;
    text-shadow: 2px 2px 0 #000; pointer-events: none;
    display: flex; gap: 40px; z-index: 10;
  }
  .score-box {
    background: rgba(0,0,0,0.7); padding: 6px 16px;
    border-radius: 8px; border: 2px solid #888;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// --- SPRITES ---

function drawBlueBird(x, y, w, h, frame) {
  const wingUp = frame % 20 < 10;
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(x + w*0.3, y + h*0.2, w*0.4, h*0.35);
  ctx.fillStyle = '#2266dd';
  ctx.fillRect(x + w*0.6, y + h*0.15, w*0.25, h*0.25);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + w*0.64, y + h*0.18, w*0.10, h*0.10);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + w*0.665, y + h*0.205, w*0.05, h*0.05);
  ctx.fillStyle = '#ffaa00';
  ctx.fillRect(x + w*0.75, y + h*0.22, w*0.12, h*0.06);
  ctx.fillStyle = '#3377ee';
  if (wingUp) ctx.fillRect(x + w*0.42, y + h*0.02, w*0.16, h*0.22);
  else ctx.fillRect(x + w*0.38, y + h*0.35, w*0.2, h*0.22);
  ctx.fillStyle = '#2266dd';
  ctx.fillRect(x + w*0.2, y + h*0.3, w*0.2, h*0.2);
}

function drawBirdByType(bird, x, y, w, h, frame) {
  if (bird.name === '小蓝') drawBlueBird(x, y, w, h, frame);
  else if (bird.name === '小蓝莓') drawBlueberryBird(x, y, w, h, frame);
  else if (bird.name === '小绿') drawGreenBird(x, y, w, h, frame);
  else if (bird.name === '小芒果') drawMangoBird(x, y, w, h, frame);
  else if (bird.name === '白白') drawWhiteBird(x, y, w, h, frame);
  else if (bird.name === '蓝蓝') drawBlueWhiteBird(x, y, w, h, frame);
  drawHolidayAccessory(x, y, w, h, frame);
}

function drawHolidayAccessory(x, y, w, h, frame) {
  const holiday = getHoliday();
  if (holiday === 'winter' || holiday === 'spring' || holiday === 'summer' || holiday === 'autumn') return;
  const cx = x + w * 0.72;
  const top = y + h * 0.15;
  const bob = Math.sin(frame * 0.08) * 1;

  if (holiday === 'christmas') {
    ctx.fillStyle = '#cc2020';
    ctx.fillRect(cx - 5, top - 12 + bob, 10, 8);
    ctx.fillRect(cx - 6, top - 5 + bob, 12, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 7, top - 1 + bob, 14, 3);
    ctx.fillRect(cx + 2, top - 16 + bob, 4, 4);
    ctx.fillStyle = '#cc2020';
    ctx.fillRect(cx + 4, top - 14 + bob, 4, 2);
  }
  else if (holiday === 'halloween') {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(cx - 5, top - 14 + bob, 10, 10);
    ctx.fillRect(cx - 8, top - 4 + bob, 16, 4);
    ctx.fillStyle = '#8833cc';
    ctx.fillRect(cx - 7, top - 3 + bob, 14, 2);
    ctx.fillStyle = '#ff8833';
    ctx.fillRect(cx + 3, top - 16 + bob, 3, 3);
  }
  else if (holiday === 'dongzhi') {
    ctx.fillStyle = '#dd4444';
    ctx.fillRect(cx - 6, top - 6 + bob, 12, 7);
    ctx.fillStyle = '#ffcccc';
    ctx.fillRect(cx - 8, top - 3 + bob, 16, 4);
    ctx.fillRect(cx + 4, top - 10 + bob, 3, 4);
  }
  else if (holiday === 'yuandan') {
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(cx - 3, top - 12 + bob, 6, 3);
    ctx.fillRect(cx - 5, top - 9 + bob, 10, 4);
    ctx.fillRect(cx - 6, top - 5 + bob, 12, 4);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(cx, top - 14 + bob, 3, 3);
    ctx.fillStyle = '#4444ff';
    ctx.fillRect(cx - 2, top - 7 + bob, 2, 2);
    ctx.fillRect(cx + 2, top - 4 + bob, 2, 2);
  }
  else if (holiday === 'laba') {
    ctx.fillStyle = '#dd8844';
    ctx.fillRect(cx - 5, top - 7 + bob, 10, 6);
    ctx.fillStyle = '#cc6622';
    ctx.fillRect(cx - 6, top - 5 + bob, 12, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 1, top - 11 + bob, 2, 4);
    ctx.fillRect(cx + 3, top - 10 + bob, 2, 3);
  }
  else if (holiday === 'cny') {
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(cx - 3, top - 9 + bob, 6, 8);
    ctx.fillRect(cx - 4, top - 10 + bob, 8, 2);
    ctx.fillRect(cx - 4, top - 1 + bob, 8, 2);
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(cx - 1, top - 11 + bob, 2, 2);
    ctx.fillRect(cx - 1, top + 1 + bob, 2, 2);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(cx, top - 7 + bob, 1, 5);
  }
  else if (holiday === 'yuanxiao') {
    ctx.fillStyle = '#8833cc';
    ctx.fillRect(cx - 3, top - 9 + bob, 6, 8);
    ctx.fillRect(cx - 4, top - 10 + bob, 8, 2);
    ctx.fillRect(cx - 4, top - 1 + bob, 8, 2);
    ctx.fillStyle = '#ffdd88';
    ctx.fillRect(cx - 2, top - 4 + bob, 4, 3);
  }
  else if (holiday === 'valentine') {
    ctx.fillStyle = '#ff4488';
    ctx.fillRect(cx - 3, top - 8 + bob, 2, 3);
    ctx.fillRect(cx + 1, top - 8 + bob, 2, 3);
    ctx.fillRect(cx - 4, top - 5 + bob, 8, 3);
    ctx.fillRect(cx - 2, top - 2 + bob, 4, 2);
    ctx.fillRect(cx - 1, top + 1 + bob, 2, 1);
  }
  else if (holiday === 'easter') {
    ctx.fillStyle = '#ffddee';
    ctx.fillRect(cx - 5, top - 16 + bob, 3, 14);
    ctx.fillRect(cx + 2, top - 16 + bob, 3, 14);
    ctx.fillStyle = '#ffaacc';
    ctx.fillRect(cx - 4, top - 15 + bob, 1, 12);
    ctx.fillRect(cx + 3, top - 15 + bob, 1, 12);
  }
  else if (holiday === 'qingming') {
    ctx.fillStyle = '#44bb44';
    ctx.fillRect(cx - 0.5, top - 9 + bob, 1.5, 7);
    ctx.fillRect(cx - 3, top - 9 + bob, 2.5, 2.5);
    ctx.fillRect(cx + 1, top - 8 + bob, 2.5, 2.5);
    ctx.fillStyle = '#66dd66';
    ctx.fillRect(cx - 1, top - 10 + bob, 2, 2);
  }
  else if (holiday === 'dragonboat') {
    ctx.fillStyle = '#448833';
    ctx.fillRect(cx - 3, top - 10 + bob, 6, 3);
    ctx.fillRect(cx - 4, top - 7 + bob, 8, 4);
    ctx.fillRect(cx - 3, top - 3 + bob, 6, 2);
    ctx.fillStyle = '#cc9966';
    ctx.fillRect(cx - 3, top - 5 + bob, 6, 1);
    ctx.fillStyle = '#66aa44';
    ctx.fillRect(cx - 5, top - 7 + bob, 1, 3);

  else if (holiday === 'qixi') {
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(cx - 2, top - 4 + bob, 4, 3);
    ctx.fillRect(cx - 3, top - 8 + bob, 6, 3);
    ctx.fillRect(cx - 1, top - 9 + bob, 2, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - 2, top - 5 + bob, 4, 1);
  }
  else if (holiday === 'guoqing') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 5, top - 15 + bob, 1, 15);
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(cx - 3, top - 15 + bob, 9, 6);
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(cx - 1, top - 14 + bob, 3, 2);
    ctx.fillRect(cx + 3, top - 13 + bob, 1, 1);
    ctx.fillRect(cx + 4, top - 12 + bob, 1, 1);

  else if (holiday === 'midautumn') {
    ctx.fillStyle = '#ffe4e0';
    ctx.fillRect(cx - 5, top - 14 + bob, 3, 12);
    ctx.fillRect(cx + 2, top - 14 + bob, 3, 12);
    ctx.fillStyle = '#ffcccc';
    ctx.fillRect(cx - 4, top - 13 + bob, 1, 10);
    ctx.fillRect(cx + 3, top - 13 + bob, 1, 10);
  }
  else if (holiday === 'chongyang') {
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(cx - 2, top - 8 + bob, 4, 4);
    ctx.fillRect(cx - 4, top - 7 + bob, 8, 2);
    ctx.fillRect(cx - 1, top - 9 + bob, 2, 7);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(cx - 3, top - 6 + bob, 2, 2);
    ctx.fillRect(cx + 1, top - 6 + bob, 2, 2);

}

// --- MARIO-STYLE TILES ---

function drawBrick(x, y, w, h) {
  ctx.fillStyle = '#c84c0c'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#e09050'; ctx.fillRect(x + 1, y + 1, w - 2, 1); ctx.fillRect(x + 1, y + 1, 1, h - 2);
  ctx.fillStyle = '#a03000'; ctx.fillRect(x, y + h - 1, w, 1); ctx.fillRect(x + w - 1, y, 1, h);
  ctx.fillStyle = '#8b4513'; ctx.fillRect(x + w/2 - 1, y, 2, h/2); ctx.fillRect(x + w/4, y + h/2, w/2, 2);
}

function drawMysteryBox(x, y, w, h, frame) {
  const glow = Math.sin(frame * 0.15) * 0.3 + 0.7;
  ctx.fillStyle = '#ffb800'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#ffdd60'; ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
  ctx.fillStyle = '#c88000'; ctx.fillRect(x, y + h - 2, w, 2); ctx.fillRect(x + w - 2, y, 2, h);
  ctx.fillStyle = `rgba(180,100,0,${glow})`;
  ctx.font = `${h*0.65}px "Courier New"`; ctx.textAlign = 'center';
  ctx.fillText('?', x + w/2, y + h*0.75);
}

function drawPipe(x, y, w, h, warp) {
  ctx.fillStyle = '#20a020'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#40d840'; ctx.fillRect(x + 2, y, w - 4, 2); ctx.fillRect(x + 2, y, 3, h);
  ctx.fillStyle = '#106010'; ctx.fillRect(x + w - 4, y, 3, h);
  const topW = w + 12, topH = 14;
  if (warp) {
    ctx.fillStyle = '#cc8800'; ctx.fillRect(x - 6, y - topH, topW, topH);
    ctx.fillStyle = '#eebb30'; ctx.fillRect(x - 4, y - topH + 2, topW - 8, 3);
    ctx.fillStyle = '#996600'; ctx.fillRect(x + topW - 10, y - topH, 3, topH);
    ctx.fillStyle = '#fff'; ctx.font = '10px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText('↓', x + w/2, y - 3);
  } else {
    ctx.fillStyle = '#20a020'; ctx.fillRect(x - 6, y - topH, topW, topH);
    ctx.fillStyle = '#40d840'; ctx.fillRect(x - 4, y - topH + 2, topW - 8, 3);
    ctx.fillStyle = '#106010'; ctx.fillRect(x + topW - 10, y - topH, 3, topH);
  }
}

function drawCloud(x, y, w, h) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x + w*0.2, y + h*0.3, w*0.6, h*0.5);
  ctx.fillRect(x + w*0.1, y + h*0.15, w*0.4, h*0.5);
  ctx.fillRect(x + w*0.5, y + h*0.2, w*0.4, h*0.45);
  ctx.fillRect(x + w*0.3, y, w*0.35, h*0.4);
}

function drawGround(x, y, w, h) {
  ctx.fillStyle = '#5aad38'; ctx.fillRect(x, y, w, h * 0.3);
  ctx.fillStyle = '#4a9d28';
  for (let i = 0; i < w; i += 6) ctx.fillRect(x + i, y, 3, 4);
  ctx.fillStyle = '#c84c0c'; ctx.fillRect(x, y + h * 0.3, w, h * 0.7);
  ctx.fillStyle = '#a03c00';
  for (let i = 0; i < w; i += 20)
    for (let j = 0; j < h * 0.7; j += 20)
      ctx.fillRect(x + i + (j % 40 === 0 ? 8 : 2), y + h * 0.3 + j + 3, 4, 2);
}

function drawCoin(x, y, r, frame) {
  const shine = Math.abs(Math.sin(frame * 0.1));
  ctx.fillStyle = shine > 0.5 ? '#ffdd00' : '#ccaa00';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffee55';
  ctx.beginPath(); ctx.arc(x - r*0.2, y - r*0.2, r*0.3, 0, Math.PI * 2); ctx.fill();
}

// --- COIN SOUND ---
let coinAudioCtx = null;
function coinDing() {
  try {
    if (!coinAudioCtx) coinAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = coinAudioCtx.createOscillator();
    const gain = coinAudioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, coinAudioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(1200, coinAudioCtx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.08, coinAudioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, coinAudioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(coinAudioCtx.destination);
    osc.start(coinAudioCtx.currentTime);
    osc.stop(coinAudioCtx.currentTime + 0.1);
  } catch(e) {}
}

function winJingle() {
  try {
    if (!coinAudioCtx) coinAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    const t = coinAudioCtx.currentTime;
    notes.forEach((freq, i) => {
      const osc = coinAudioCtx.createOscillator();
      const gain = coinAudioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t + i * 0.12);
      gain.gain.setValueAtTime(0.07, t + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.18);
      osc.connect(gain);
      gain.connect(coinAudioCtx.destination);
      osc.start(t + i * 0.12);
      osc.stop(t + i * 0.12 + 0.18);
    });
  } catch(e) {}
}

// Cross-platform male voice names
const MALE_VOICES_EN = [
  'Google US English',
  'Microsoft David Desktop - English (United States)',
  'Microsoft Mark Desktop - English (United States)',
  'Microsoft Guy',
  'Alex', 'Fred',
];
const MALE_VOICES_ZH = [
  'Google 普通话（中国大陆）',
  'Microsoft Kangkang - Chinese (Simplified, PRC)',
  'Microsoft Yunyang - Chinese (Simplified, PRC)',
  'Yunjian', 'Yunxi', 'Li-Mu',
];
function speakRules() {
  try {
    speechSynthesis.cancel();
    const isZh = lang === 'zh';
    const utter = new SpeechSynthesisUtterance(
      isZh ? (TXT.zh.bubble_line1 + TXT.zh.bubble_line2) : (TXT.en.bubble_line1 + ' ' + TXT.en.bubble_line2)
    );
    utter.lang = isZh ? 'zh-CN' : 'en-US';
    utter.rate = 0.95;
    utter.pitch = 0.85;
    utter.volume = 0.9;
    const doSpeak = () => {
      const voices = speechSynthesis.getVoices();
      const voiceList = isZh ? MALE_VOICES_ZH : MALE_VOICES_EN;
      const langPrefix = isZh ? 'zh' : 'en';
      for (const name of voiceList) {
        const v = voices.find(function(v2) { return v2.name === name && v2.lang.startsWith(langPrefix); });
        if (v) { utter.voice = v; break; }
      }
      speechSynthesis.speak(utter);
    };
    if (speechSynthesis.getVoices().length > 0) {
      doSpeak();

      speechSynthesis.addEventListener('voiceschanged', function cb() {
        speechSynthesis.removeEventListener('voiceschanged', cb);

    }

}

function loseJingle() {
  try {
    if (!coinAudioCtx) coinAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [784, 659, 523, 392]; // G5 E5 C5 G4
    const t = coinAudioCtx.currentTime;
    notes.forEach((freq, i) => {
      const osc = coinAudioCtx.createOscillator();
      const gain = coinAudioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t + i * 0.15);
      gain.gain.setValueAtTime(0.07, t + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.22);
      osc.connect(gain);
      gain.connect(coinAudioCtx.destination);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 0.22);
    });
  } catch(e) {}
}

function drawGrayBird(gb) {
  if (!gb) return;
  if (gb.y < cameraY - 60 || gb.y > cameraY + H + 60) return;

  const bw2 = 36, bh2 = 32;

  // Beak
  ctx.fillStyle = '#ff6600'; ctx.fillRect(sx + bw2*0.75, sy + bh2*0.22, bw2*0.12, bw2*0.06);

  gb.wingFrame++;

  ctx.fillStyle = '#888';
  if (wingUp) ctx.fillRect(sx + bw2*0.42, sy + bh2*0.02, bw2*0.16, bh2*0.22);
  else ctx.fillRect(sx + bw2*0.38, sy + bh2*0.35, bw2*0.2, bh2*0.22);
  // Tail
  ctx.fillStyle = '#777'; ctx.fillRect(sx + bw2*0.2, sy + bh2*0.3, bw2*0.2, bh2*0.2);
  // Label
  ctx.fillStyle = '#ff4444'; ctx.font = 'bold 9px "Courier New"'; ctx.textAlign = 'center';
  ctx.fillText(t('bird_gray'), sx + bw2/2, sy - 4);
}

function damageNearestPlatform() {
  if (!grayBird) return;
  let best = null, bestDist = Infinity;
  for (const p of platforms) {
    if (p.type === 'ground' || p.type === 'goal' || p.damaged) continue;
    if (p.y <= grayBird.y) continue;
    const dx = (p.x + p.w/2) - grayBird.x;
    const dy = p.y - grayBird.y;
    const dist = Math.abs(dx) + dy;
    if (dist < bestDist && dy < 300) { bestDist = dist; best = p; }
  }
  if (best) best.damaged = true;
}
function damageNearestPipe() {
  if (!grayBird) return;
  let best = null, bestDist = Infinity;
  for (const p of pipes) {
    if (p.damaged) continue;
    if (p.y <= grayBird.y) continue;
    const dx = (p.x + p.w/2) - grayBird.x;
    const dy = p.y - grayBird.y;
    const dist = Math.abs(dx) + dy;
    if (dist < bestDist && dy < 300) { bestDist = dist; best = p; }
  }
  if (best) best.damaged = true;
}
function damageNearestCloud() {
  if (!grayBird) return;
  let best = null, bestDist = Infinity;
  for (const c of clouds) {
    if (c.damaged) continue;
    const dx = (c.x + c.w/2) - grayBird.x;
    const dy = c.y - grayBird.y;
    const dist = Math.abs(dx) + Math.abs(dy);
    if (dist < bestDist && dist < 300) { bestDist = dist; best = c; }
  }
  if (best) best.damaged = true;
}

function updateGrayBird() {
  if (!grayBird) return;
  const gb = grayBird;

  // SuperFlight: player-controlled gray bird flies freely
  if (hasSuperFlight && grayBirdPlayer) {
    gb.vy = 0;
    if (ctrl.jump) gb.vy = -MOVE_SPEED * 1.5;
    else if (ctrl.down) gb.vy = MOVE_SPEED * 1.5;
    gb.vx = 0;
    if (ctrl.left) gb.vx = -2;
    else if (ctrl.right) gb.vx = 2;
    gb.x += gb.vx;
    gb.y += gb.vy;
    if (gb.x < -20) gb.x = -20;
    if (gb.x > W + 20) gb.x = W + 20;
    const goalClamp2 = currentWorld === 3 ? -29540 : currentWorld === 2 ? -19540 : -9540;
    if (gb.y < goalClamp2) gb.y = goalClamp2;
    if (gb.y > 500) gb.y = 500;
    const gh = 460 - gb.y;
    if (gh > gb.maxHeight) gb.maxHeight = gh;
    return;
  }

  // Find nearest platform ABOVE to target
  let tx = gb.x + gb.vx * 30, ty = gb.y - 100;
  let targetPlat = null, bestDist = Infinity;
  for (const p of platforms) {
    if (p.type === 'ground' || p.type === 'goal') continue;
    if (p.y >= gb.y - 10) continue;
    const dx = (p.x + p.w/2) - gb.x;
    const dy = gb.y - p.y;
    const dist = Math.abs(dx) + dy * 2;
    if (dist < bestDist && dy < 500 && !p.damaged) { bestDist = dist; targetPlat = p; }
  }
  if (!targetPlat) {
    for (const p of platforms) {
      if (p.type === 'ground' || p.type === 'goal') continue;
      if (p.y >= gb.y - 10) continue;
      const dx = (p.x + p.w/2) - gb.x;
      const dy = gb.y - p.y;
      const dist = Math.abs(dx) + dy * 2;
      if (dist < bestDist && dy < 500) { bestDist = dist; targetPlat = p; }
    }
  }

  // Find nearest coin ABOVE to steal
  let targetCoin = null, coinDist = Infinity;
  for (const c of coins) {
    if (c.collected) continue;
    if (c.y >= gb.y) continue;
    const dx = c.x - gb.x;
    const dy = gb.y - (c.y - 10);
    const dist = Math.abs(dx) + Math.abs(dy);
    if (dist < coinDist && dy < 400) { coinDist = dist; targetCoin = c; }
  }

  // Steer toward target
  if (targetCoin && targetPlat && coinDist < bestDist * 0.8) {
    tx = targetCoin.x; ty = targetCoin.y - 10;
  } else if (targetPlat) {
    tx = targetPlat.x + targetPlat.w/2; ty = targetPlat.y;
  } else {
    tx = gb.x + gb.vx * 30; ty = gb.y - 80;
  }

  const dx = tx - gb.x, dy = ty - gb.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  gb.vx += (dx / dist) * 0.3;
  gb.vy += (dy / dist) * 0.3;
  gb.vx = Math.max(-3, Math.min(3, gb.vx * 0.95));
  gb.vy = Math.max(-4, Math.min(0, gb.vy * 0.95));

  gb.x += gb.vx;
  gb.y += gb.vy;

  // Damage platforms on contact
  for (const p of platforms) {
    if (p.type === 'ground' || p.type === 'goal' || p.damaged) continue;
    if (gb.x + 36 > p.x && gb.x < p.x + p.w && Math.abs(gb.y + 16 - p.y) < 18) {
      p.damaged = true;
    }
  }

  // Damage pipes on contact
  for (const p of pipes) {
    if (p.damaged) continue;
    if (gb.x + 36 > p.x - 6 && gb.x < p.x + p.w + 6 && Math.abs(gb.y + 16 - p.y) < 18) {
      p.damaged = true;
    }
  }

  // Steal coins on contact
  for (const c of coins) {
    if (c.collected) continue;
    if (Math.abs(gb.x + 18 - c.x) < 20 && Math.abs(gb.y + 16 - (c.y - 5)) < 20) {
      c.collected = true; gb.coins++; if (grayBirdPlayer) { totalCoins++; localStorage.setItem('superBirdsTotalCoins', totalCoins); } coinDing();
    }
  }

  // Track max height
  const gh = 460 - gb.y;
  if (gh > gb.maxHeight) gb.maxHeight = gh;

  // World bounds
  if (gb.x < -60) gb.x = -60;
  if (gb.x > W + 60) gb.x = W + 60;
  const goalClamp = (currentWorld === 3 ? -29540 : currentWorld === 2 ? -19540 : -9540);
  if (gb.y < goalClamp) gb.y = goalClamp;
  if (gb.y > 500) gb.y = 500;
}

function assignBird(bird) {
  // Clicking already-selected bird → deselect
  if (bird === p1Bird) {
    bird.controller = 'ai';
    bird.spd = (getTraits(bird.name) || {}).spd || 1;
    p1Bird = null;
    localStorage.removeItem('superBirdsDefaultBird');
    return;
  }
  // Deselect previous bird if any
  if (p1Bird) {
    p1Bird.controller = 'ai';
    p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1;
  }
  // Select new bird
  bird.controller = 'p1';
  bird.spd = 2;
  p1Bird = bird;
  localStorage.setItem('superBirdsDefaultBird', bird.name);
}

function loadDefaultBird() {
  const saved = localStorage.getItem('superBirdsDefaultBird');
  if (!saved) return;
  if (saved === 'gray') {
    grayBirdPlayer = true;
    if (p1Bird) { p1Bird.controller = 'ai'; p1Bird.spd = (getTraits(p1Bird.name) || {}).spd || 1; p1Bird = null; }
    return;
  }
  const birds = getAllBirds();
  for (const b of birds) {
    if (b.name === saved && !isLocked(b.name)) {
      assignBird(b);
      return;
    }
  }
}

function generateWorld(startY, endY) {
  let prevPlatforms = platforms.filter(p => p.y >= startY - 20 && p.y <= startY + 80);
  if (prevPlatforms.length === 0) {
    let bestY = -Infinity;
    for (const p of platforms) { if (p.y > bestY && p.y <= startY + 80) bestY = p.y; }
    prevPlatforms = platforms.filter(p => p.y === bestY);
  }
  const horizontalReach = 160;
  for (let wy = startY; wy >= endY; wy -= PLATFORM_SPACING) {
    const levelPlatforms = [];
    const pw = 120 + Math.random() * 160;
    let px;
    if (prevPlatforms.length > 0) {
      const ref = prevPlatforms[Math.floor(Math.random() * prevPlatforms.length)];
      const refCx = ref.x + ref.w / 2, halfPw = pw / 2;
      const minX = Math.max(30, refCx - horizontalReach - halfPw);
      const maxX = Math.min(W - pw - 30, refCx + horizontalReach - halfPw);
      px = (maxX > minX) ? minX + Math.random() * (maxX - minX) : 30 + Math.random() * (W - pw - 60);
    } else {
      px = 30 + Math.random() * (W - pw - 60);
    }
    const plat = { x: px, y: wy, w: pw, h: 16, type: 'brick', prevX: px, prevY: wy, dx: 0, dy: 0 };
    plat.moveType = Math.random() < 0.5 ? 'horizontal' : 'vertical';
    plat.moveSpeed = 0.4 + Math.random() * 1.2;
    plat.moveRange = 30 + Math.random() * 80;
    plat.movePhase = Math.random() * Math.PI * 2;
    plat.originX = px;
    plat.originY = wy;
    platforms.push(plat);
    levelPlatforms.push(plat);

    const mysteryCount = platforms.filter(p => p.type === 'mystery').length;
    if (Math.random() < 0.5 && mysteryCount < 50) {
      const pw2 = 80 + Math.random() * 100;
      let px2;
      if (prevPlatforms.length > 0) {
        const ref = prevPlatforms[Math.floor(Math.random() * prevPlatforms.length)];
        const refCx = ref.x + ref.w / 2, halfPw2 = pw2 / 2;
        const minX = Math.max(30, refCx - horizontalReach - halfPw2);
        const maxX = Math.min(W - pw2 - 30, refCx + horizontalReach - halfPw2);
        px2 = (maxX > minX) ? minX + Math.random() * (maxX - minX) : 30 + Math.random() * (W - pw2 - 60);
      } else {
        px2 = 30 + Math.random() * (W - pw2 - 60);
      }
      platforms.push({ x: px2, y: wy - 15 + Math.random() * 25, w: pw2, h: 16, type: 'mystery' });
      levelPlatforms.push(plat);
    }

    if (Math.random() < 0.6) {
      coins.push({ x: 80 + Math.random() * (W - 160), y: wy - 25 + Math.random() * 20, r: 8, collected: false });
    }
    // Cloud platform (steppable, lasts 0.5s)
    if (Math.random() < 0.35) {
      const cw = 80 + Math.random() * 100;
      const cx = 30 + Math.random() * (W - cw - 60);
      platforms.push({ x: cx, y: wy - 30 - Math.random() * 40, w: cw, h: 20, type: 'cloud', cloudTimer: 0, damaged: false });
    }
    prevPlatforms = levelPlatforms;
  }
  for (let wy = startY; wy >= endY; wy -= 150) {
    if (Math.random() < 0.6) {
      clouds.push({ x: Math.random() * (W - 100), y: wy + Math.random() * 40, w: 60 + Math.random() * 50, h: 30 + Math.random() * 20 });
    }
  }
}

  }

}

function initWorld() {
  platforms = []; coins = []; pipes = []; clouds = [];
  cameraY = 0; targetCameraY = 0; winner = null; winSoundPlayed = false; frame = 0;

  platforms.push({ x: 0, y: 460, w: W, h: 140, type: 'ground' });
  platforms.push({ x: 60, y: 380, w: 300, h: 16, type: 'brick' });
  platforms.push({ x: 420, y: 380, w: 300, h: 16, type: 'brick' });
  platforms.push({ x: 180, y: 290, w: 400, h: 16, type: 'mystery' });
  const goalY = (currentWorld === 3 ? 30000 : currentWorld === 2 ? 20000 : 10000);
  // Goal platform
  platforms.push({ x: W/2 - 150, y: 460 - goalY, w: 300, h: 16, type: 'goal' });

  // Extra starting steps for world 2 and 3
  if (currentWorld >= 2) {
    platforms.push({ x: 50, y: 190, w: 200, h: 16, type: 'brick' });
    platforms.push({ x: 380, y: 190, w: 200, h: 16, type: 'brick' });
    platforms.push({ x: 180, y: 90, w: 300, h: 16, type: 'mystery' });
    platforms.push({ x: 80, y: -10, w: 180, h: 16, type: 'brick' });
    platforms.push({ x: 380, y: -10, w: 180, h: 16, type: 'brick' });
  }

  generateWorld(currentWorld >= 2 ? -110 : 280, 460 - goalY);

  // Random pipe placement throughout the world
  // Random 1-3 pipes
  const pipeCount = 3;
  const pipeCandidates = platforms.filter(p => p.type !== 'ground' && p.type !== 'goal').sort(() => Math.random() - 0.5).slice(0, pipeCount);
  const pipePlats = pipeCandidates.sort((a, b) => b.y - a.y); // descending y: lowest first (1→2→3)
  // Pipe chain: 1→2→3→2 (low→mid→high→mid)
  for (let i = 0; i < pipePlats.length; i++) {
    const pp = pipePlats[i];
    let tx, ty;
    if (pipePlats.length >= 3) {
      const targets = [1, 2, 1];
      const ti = targets[i];
      tx = pipePlats[ti].x + pipePlats[ti].w / 2;
      ty = pipePlats[ti].y;
    } else if (pipePlats.length === 2) {
      const ti = (i + 1) % 2;
      tx = pipePlats[ti].x + pipePlats[ti].w / 2;
      ty = pipePlats[ti].y;
    } else {
      tx = 200 + Math.random() * 400;
      ty = pp.y - 2000 - Math.random() * 3000;
    }
    const pipeX = pp.x + pp.w / 2 - 16;
    pipes.push({ x: pipeX, y: pp.y, w: 32, h: 40, warp: true, targetX: tx, targetY: ty });
  }
}

function updateBird(bird, ctrl) {
  let spd = MOVE_SPEED * (bird.spd || 1);
  if (ctrl.left) bird.vx = -spd;
  else if (ctrl.right) bird.vx = spd;
  else bird.vx *= (bird.fric || 0.8);

  // SuperFlight: p1 bird flies freely
  if (hasSuperFlight && bird.controller === 'p1') {
    bird.vy = 0;
    if (ctrl.jump) bird.vy = -MOVE_SPEED * 1.5;
    else if (ctrl.down) bird.vy = MOVE_SPEED * 1.5;
  } else {
    bird.vy += GRAVITY * (bird.grav || 1);
    if (bird.vy > MAX_FALL_SPEED) bird.vy = MAX_FALL_SPEED;
  }

  const prevY = bird.y;
  bird.x += bird.vx;
  bird.y += bird.vy;

  if (bird.x < 0) bird.x = 0;
  if (bird.x > W - BIRD_W) bird.x = W - BIRD_W;

  bird.onGround = false;
  bird.onPipe = null;
  let landedOnGround = false;
  for (const p of platforms) {
    if (bird.x + BIRD_W > p.x + 4 && bird.x < p.x + p.w - 4) {
      if (bird.vy >= 0 && prevY + BIRD_H <= p.y + 10 && bird.y + BIRD_H >= p.y) {
        bird.y = p.y - BIRD_H;
        bird.x += p.dx || 0; bird.y += p.dy || 0;
        bird.vy = 0;
        bird.onGround = true;
        if (p.type === 'ground') landedOnGround = true;
        if (p.type === 'mystery' && !bird.hasDoubleJump && (!p.damaged)) {
          bird.hasDoubleJump = true;
          bird.doubleJump = 300;
          bird.djCharges = 3;
        }
      }
    }
  }

  if (landedOnGround) bird.maxHeight = 0;

  for (const p of pipes) {
    const topX = p.x - 6, topY = p.y - 14, topW = p.w + 12;
    if (bird.x + BIRD_W > topX + 4 && bird.x < topX + topW - 4) {
      if (bird.vy >= 0 && prevY + BIRD_H <= topY + 10 && bird.y + BIRD_H >= topY) {
        bird.y = topY - BIRD_H;
        bird.x += p.dx || 0; bird.y += p.dy || 0;
        bird.vy = 0;
        bird.onGround = true;
        if (p.warp && (!p.damaged)) bird.onPipe = p;
      }
    }
  }

  // Don't jump if standing on a pipe and pressing down — warp takes priority
  if (ctrl.jump && bird.onGround && !(bird.onPipe && ctrl.down)) {
    bird.vy = JUMP_FORCE * (bird.jmp || 1);
    bird.onGround = false;
    bird.onPipe = null;
  }

  if (ctrl.jump && !bird.onGround && bird.hasDoubleJump && bird.djCharges > 0) {
    bird.vy = JUMP_FORCE * (bird.jmp || 1);
    bird.djCharges--;
    if (bird.djCharges <= 0) { bird.hasDoubleJump = false; bird.doubleJump = 0; }
  }

  if (ctrl.down && bird.onPipe && bird.onPipe.warp) {
    // Check target pipe still exists and isn't damaged
    const tp = pipes.find(p => Math.abs(p.x - bird.onPipe.targetX) < 20 && Math.abs(p.y - bird.onPipe.targetY) < 20);
    if (tp && (!tp.damaged || !bird.onPipe.damaged)) {
      bird.x = bird.onPipe.targetX;
      bird.y = bird.onPipe.targetY - 14 - BIRD_H - 8;
      bird.vy = 2;
    }
    bird.onPipe = null;
    bird.onGround = false;
  }

  const heightAboveGround = 460 - bird.y;
  if (heightAboveGround > bird.maxHeight) bird.maxHeight = heightAboveGround;
}

function update() {
  frame++;

  // Update moving platforms
  for (const p of platforms) {
    p.prevX = p.x; p.prevY = p.y;
    if (p.moveType) {
      p.movePhase += p.moveSpeed * 0.02;
      const offset = Math.sin(p.movePhase) * p.moveRange;
      if (p.moveType === 'horizontal') p.x = p.originX + offset;
      else p.y = p.originY + offset;
    }
    p.dx = p.x - p.prevX; p.dy = p.y - p.prevY;
  }

  const ctrl = { left: keys['ArrowLeft'], right: keys['ArrowRight'], jump: keys['ArrowUp'], down: keys['ArrowDown'] };

  function aiCtrl(bird) {
    const b = { left: false, right: false, jump: false, down: false };
    const cx = bird.x + BIRD_W / 2;
    const cy = bird.y + BIRD_H;
    const drift = bird.drift || 0;
    const hop = bird.hop || 0;

    // Find platforms above and nearby
    let bestPlat = null, bestDist = Infinity;
    for (const p of platforms) {
      if (p.y >= bird.y - 10) continue;
      const dx = (p.x + p.w / 2) - cx;
      const dy = bird.y - p.y;
      const dist = Math.abs(dx) + dy * 0.3;
      if (dist < bestDist && dy < 600) { bestDist = dist; bestPlat = p; }
    }

    // Find coins
    let bestCoin = null, coinDist = Infinity;
    for (const c of coins) {
      const dx = c.x - cx;
      const dy = bird.y - (c.y - 10);
      if (Math.abs(dy) > 300) continue;
      const dist = Math.abs(dx) + Math.abs(dy) * 0.5;
      if (dist < coinDist) { coinDist = dist; bestCoin = c; }
    }

    // Horizontal: drift instinct + platform/coin seeking
    let targetDX = drift * 40;
    if (bestCoin && coinDist < 200) targetDX = bestCoin.x - cx;
    else if (bestPlat) targetDX = (bestPlat.x + bestPlat.w/2) - cx;

    if (targetDX > 8) b.right = true;
    else if (targetDX < -8) b.left = true;
    else if (Math.random() < Math.abs(drift) * 0.4) {
      if (drift > 0) b.right = true; else b.left = true;
    }

    // Jump: instinct hop + platform seeking
    if (bird.onGround) {
      const wantJump = Math.random() < hop * 1.5;
      const needJump = bestPlat && (bestPlat.y < bird.y - 30) && Math.abs((bestPlat.x + bestPlat.w/2) - cx) < 200;
      if (wantJump || needJump) b.jump = true;
    }

    // Pipe warp
    if (bird.onPipe && bird.onPipe.warp) {
      const gain = bird.y - bird.onPipe.targetY;
      if (gain > 80 || (gain > 20 && Math.random() < 0.4)) b.down = true;
    }

    return b;
  }

  function getCtrl(bird) {
    if (bird === p1Bird) return ctrl;
    if (bird === grayBird && grayBirdPlayer) return ctrl;
    return aiCtrl(bird);
  }

  for (const b of getAllBirds()) { const c = getCtrl(b); b.lastCtrl = c; updateBird(b, c); }
  if (grayBird && grayBirdPlayer) { const c = getCtrl(grayBird); grayBird.lastCtrl = c; updateBird(grayBird, c); }

  // Double-jump timer
  const djbirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of djbirds) {
    if (b.hasDoubleJump && b.doubleJump > 0) {
      b.doubleJump--;
      if (b.doubleJump <= 0) { b.hasDoubleJump = false; b.djCharges = 0; }
    }
  }

  // Spectate timer
  if (spectateTimer > 0) {
    spectateTimer--;
    if (spectateTimer <= 0) spectateBird = null;
  }

  // Camera
  let camTargetY;
  if (spectateBird) camTargetY = spectateBird.y;
  else if (p1Bird) camTargetY = p1Bird.y;
  else if (grayBird && grayBirdPlayer) camTargetY = grayBird.y;
  else camTargetY = Math.min(...getAllBirds().map(b => b.y));
  cameraY = camTargetY - H / 2;

  // Fallen into void
  for (const b of getAllBirds()) {
    if (b.y > 800) { gameState = 'over'; winner = getHighestBird([b]); break; }
  }
  if (grayBird && grayBird.y > 800) {
    if (grayBirdPlayer) {
      // Player gray bird fell = game over
      gameState = 'over';
      const racers = getAllBirds();
      winner = racers.reduce((a, b) => (b.maxHeight > a.maxHeight ? b : a), racers[0]);
    } else {
      // AI gray bird fell, respawn after 3 seconds
      grayBird = null; grayBirdRespawn = 30;
    }
  }
  if (grayBirdRespawn > 0) {
    grayBirdRespawn--;
    if (grayBirdRespawn <= 0 && gameState === 'playing') spawnGrayBird();
  }

  // Win condition: reach goal height
  const goal = (currentWorld === 3 ? 30000 : currentWorld === 2 ? 20000 : 10000);
  const allRacers = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of allRacers) {
    if (b.maxHeight >= goal) {
      const allUnlockedW1 = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'].every(function(k) { return !isLockedT1(k); });
      const allUnlockedW2 = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'].every(function(k) { return !isLockedT2(k); }) || localStorage.getItem('superBirdsWorld3Unlocked') === '1';
      if (currentWorld === 1 && allUnlockedW1) {
        // Portal: award coins + spin into world 2
        totalCoins += 100;
        localStorage.setItem('superBirdsTotalCoins', totalCoins);
        portalNextWorld = 2;
        portalSpinTimer = 90;
        gameState = 'portalSpin';
      } else if (currentWorld === 2 && allUnlockedW2) {
        // Portal: award coins + spin into world 3
        totalCoins += 100;
        localStorage.setItem('superBirdsTotalCoins', totalCoins);
        portalNextWorld = 3;
        portalSpinTimer = 90;
        gameState = 'portalSpin';
      } else {
        gameState = 'over';
        winner = b;
        for (const b2 of allRacers) {
          if (b2.maxHeight > winner.maxHeight) winner = b2;
        }
      }
      break;
    }
  }

  // Coin magnet: attract coins to birds with magnet power-up
  const magnetBirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const c of coins) {
    if (c.collected) continue;
    for (const b of magnetBirds) {
      continue;
      const cx = b.x + (b === grayBird ? 18 : BIRD_W/2);
      const cy = b.y + (b === grayBird ? 16 : BIRD_H/2);
      const dx = cx - c.x;
      const dy = cy - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200 && dist > 5) {
        c.x += (dx / dist) * 6;
        c.y += (dy / dist) * 6;
        break;
      }
    }
  }

  // Coin Magnet: attract nearby coins to p1 bird
  if (coinMagnet && (p1Bird || (grayBirdPlayer && grayBird))) {
    const magnetBird = p1Bird || grayBird;
    for (const c of coins) {
      if (c.collected) continue;
      const dx = (magnetBird.x + BIRD_W/2) - c.x;
      const dy = (magnetBird.y + BIRD_H/2) - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0 && dist < 200) {
        const speed = 3 + (200 - dist) / 20;
        c.x += (dx / dist) * speed;
        c.y += (dy / dist) * speed;
      }
    }
  }

  // Collect coins
  const coinBirds = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const c of coins) {
    if (c.collected) continue;
    for (const b of coinBirds) {
      if (b.x + BIRD_W > c.x - c.r && b.x < c.x + c.r &&
          b.y + BIRD_H > c.y - c.r && b.y < c.y + c.r) {
        c.collected = true; b.coins++; if (b === p1Bird) { totalCoins++; localStorage.setItem('superBirdsTotalCoins', totalCoins); } coinDing(); break;
      }
    }
  }

  // Pipe collision
  for (const p of pipes) {
    if (p.damaged) continue;
    for (const b of coinBirds) {
      if (b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
          b.y + BIRD_H > p.y - 12 && b.y < p.y + p.h - 4) {
        if (b.x + BIRD_W/2 < p.x + p.w/2) b.x = p.x - BIRD_W;
        else b.x = p.x + p.w;
      }
    }
  }

  // Generate more world
  const minWorldY = cameraY - 600;
  const lowestPlatform = platforms.reduce((min, p) => Math.min(min, p.y), Infinity);
  if (lowestPlatform > minWorldY + 200) {
    generateWorld(lowestPlatform - PLATFORM_SPACING, Math.max(minWorldY, (currentWorld === 3 ? -29540 : currentWorld === 2 ? -19540 : -9540)));
  }

  // Platforms never disappear — only trim if memory cap exceeded
  const maxPlatforms = currentWorld === 3 ? 750 : currentWorld === 2 ? 500 : 250;
  if (platforms.length > maxPlatforms) {
    const groundPlat = platforms.find(p => p.type === 'ground');
    const goalPlat2 = platforms.find(p => p.type === 'goal');
    platforms.sort((a, b) => a.y - b.y);
    platforms.length = maxPlatforms;
    if (groundPlat && !platforms.includes(groundPlat)) platforms.push(groundPlat);
    if (goalPlat2 && !platforms.includes(goalPlat2)) platforms.push(goalPlat2);
  }
  // Spawn gray bird on game start
  if (!grayBird && grayBirdRespawn <= 0) {
    if (grayBirdPlayer) {
      // Player gray bird spawns at a visible position
      const gspd2 = currentWorld === 3 ? 0.5 : currentWorld === 2 ? 0.75 : 1.8;
      grayBird = { x: W/2 - 18, y: cameraY + H * 0.4, vx: 0, vy: 0, wingFrame: 0, maxHeight: 0, coins: 0, onGround: false, hasDoubleJump: false, doubleJump: 0, djCharges: 0, spd: gspd2, jmp: 1, grav: 1, fric: 0.8 };
    } else {
      spawnGrayBird();
    }
  }

  // Update AI gray bird (skip if player is gray bird)
  if (!grayBirdPlayer) updateGrayBird();

  // Damaged platforms: birds can only stand for 1 second (60 frames)
  // Gray bird player is immune to damaged platforms
  const allStanders = grayBird ? [...getAllBirds(), grayBird] : getAllBirds();
  for (const b of allStanders) {
    if (b === grayBird && grayBirdPlayer) continue; // gray bird player immune
    if (b.onGround) {
      const plat = platforms.find(p =>
        p.damaged &&
        b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
        Math.abs((b.y + BIRD_H) - p.y) < 5
      );
      if (plat) {
        b.standTimer = (b.standTimer || 0) + 1;
        if (b.standTimer >= (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird)) ? 120 : 60)) {
          // Platform breaks! Remove it
          const idx = platforms.indexOf(plat);
          if (idx >= 0) platforms.splice(idx, 1);
          b.standTimer = 0;
          b.onGround = false;
          b.vy = 2;
        }
      } else {
        b.standTimer = 0;
      }
    } else {
      b.standTimer = 0;
    }
    // Damaged pipes: stand for 2 seconds (120 frames) then break
    if (b.onGround) {
      const dpipe = pipes.find(p =>
        p.damaged &&
        b.x + BIRD_W > p.x - 6 && b.x < p.x + p.w + 6 &&
        Math.abs((b.y + BIRD_H) - (p.y - 14)) < 5
      );
      if (dpipe) {
        b.pipeStandTimer = (b.pipeStandTimer || 0) + 1;
        if (b.pipeStandTimer >= (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird)) ? 240 : 120)) {
          const idx = pipes.indexOf(dpipe);
          if (idx >= 0) pipes.splice(idx, 1);
          b.pipeStandTimer = 0;
          b.onGround = false;
          b.vy = 2;
        }
      } else {
        b.pipeStandTimer = 0;
      }
    } else {
      b.pipeStandTimer = 0;
    }

    // Cloud platform stand timer
    if (b.onGround) {
      const cloudPlat = platforms.find(p =>
        p.type === 'cloud' &&
        b.x + BIRD_W > p.x + 4 && b.x < p.x + p.w - 4 &&
        Math.abs((b.y + BIRD_H) - p.y) < 5
      );
      if (cloudPlat) {
        cloudPlat.cloudTimer = (cloudPlat.cloudTimer || 0) + 1;
        const anyDT = allStanders.some(s => s.onGround && s !== grayBird &&
          s.x + BIRD_W > cloudPlat.x + 4 && s.x < cloudPlat.x + cloudPlat.w - 4 &&
          Math.abs((s.y + BIRD_H) - cloudPlat.y) < 5);
        const ctMult = anyDT ? 2 : 1;
        const dtMult = (doubleTime && (b === p1Bird || (grayBirdPlayer && b === grayBird))) ? 2 : 1;
        if (cloudPlat.cloudTimer >= (cloudPlat.damaged ? 6 : 30) * ctMult * dtMult) {
          const idx = platforms.indexOf(cloudPlat);
          if (idx >= 0) platforms.splice(idx, 1);
          b.onGround = false;
          b.vy = 2;
        }
      }
    }
  }

  // Reset cloud timers for clouds not stood on
  const stoodClouds = new Set();
  for (const b of allStanders) {
    if (b.onGround) {
      const cp = platforms.find(p => p.type === 'cloud' && Math.abs((b.y + BIRD_H) - p.y) < 5);
      if (cp) stoodClouds.add(cp);
    }
  }
  for (const p of platforms) {
    if (p.type === 'cloud' && !stoodClouds.has(p)) p.cloudTimer = 0;
  }
  for (let i = coins.length - 1; i >= 0; i--) {
    if (coins[i].collected) coins.splice(i, 1);
  }
  const cloudCleanupY = cameraY + H + 3000;
  for (let i = clouds.length - 1; i >= 0; i--) {
    if (clouds[i].y >= cloudCleanupY) clouds.splice(i, 1);
  }
}

function getHighestBird(exclude) {
  let best = null;
  for (const b of getAllBirds()) {
    if (exclude && exclude.includes(b)) continue;
    if (!best || b.maxHeight > best.maxHeight) best = b;
  }
  return best;
}

function isCP(a, b) {
  if (!a || !b) return false;
  if ((a.name === '小蓝' && b.name === '小绿') || (a.name === '小绿' && b.name === '小蓝')) return true;
  if ((a.name === '小蓝莓' && b.name === '小芒果') || (a.name === '小芒果' && b.name === '小蓝莓')) return true;
  if ((a.name === '白白' && b.name === '蓝蓝') || (a.name === '蓝蓝' && b.name === '白白')) return true;
  return false;
}

function getWinTag(bird) {
  if (!bird || !winner) return '';
  if (winner === bird) {
    if (bird.controller === 'p1') return t('tag_you_win');
    if (p1Bird && isCP(bird, p1Bird)) return t('tag_cp_win');
    return t('tag_opp_win');
  }
  return '';
}

function getHoliday() {
  const now = new Date();
  const m = now.getMonth() + 1, d = now.getDate();
  if (m === 12 && d === 25) return 'christmas';
  if (m === 10 && d === 31) return 'halloween';
  if (m === 12 && d === 22) return 'dongzhi';       // Winter Solstice
  if (m === 1 && d === 1) return 'yuandan';          // New Year
  if (m === 1 && d === 7) return 'laba';             // Laba (lunar 12/8 approx)
  if (m === 2 && d === 10) return 'cny';             // Spring Festival (lunar 1/1 approx)
  if (m === 2 && d === 15) return 'yuanxiao';        // Lantern (lunar 1/15 approx)
  if (m === 2 && d === 14) return 'valentine';
  if (m === 4 && d === 12) return 'easter';          // Easter Sunday (approx)
  if (m === 4 && d === 5) return 'qingming';         // Tomb Sweeping
  if (m === 6 && d === 19) return 'dragonboat';      // Dragon Boat (lunar 5/5 approx)
  if (m === 8 && d === 25) return 'qixi';            // Double Seventh (lunar 7/7 approx)
  if (m === 10 && d === 1) return 'guoqing';         // National Day
  if (m === 9 && d === 29) return 'midautumn';       // Mid-Autumn (lunar 8/15 approx)
  if (m === 10 && d === 23) return 'chongyang';      // Double Ninth (lunar 9/9 approx)
  if (m === 12 || m === 1 || m === 2) return 'winter';
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  return 'autumn';
}

        const ly = ((i * 67 + frame * 0.08) % (H + 20)) - 10;
        ctx.fillStyle = ['#cc4400', '#ff8800', '#dd6600', '#ffaa00'][i % 4];
        ctx.fillRect(lx, ly, 3, 3);
      }
    }
  }
}

function drawHudPanel(x, y, w, h, bird, tagColor) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = tagColor;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Portal spin screen
  if (gameState === 'portalSpin') {
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0, 0, W, H);

    // Swirling portal vortex
    const cx = W/2, cy = H/2 - 30;
    const spinAngle = (portalSpinTimer / 90) * Math.PI * 4;
    ctx.save(); ctx.translate(cx, cy);

    // Outer rings
    for (let r = 0; r < 6; r++) {
      const ringR = 40 + r * 35;
      const alpha = 0.3 - r * 0.04;
      ctx.strokeStyle = 'rgba(100,180,255,' + alpha + ')';
      ctx.lineWidth = 2 + r;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, spinAngle + r * 0.5, spinAngle + r * 0.5 + Math.PI * 1.5);
      ctx.stroke();
    }

    // Spinning bird silhouette at center
    const birdAngle = spinAngle * 3;
    ctx.save();
    ctx.rotate(birdAngle);
    const bs = 2.5;
    const bx = -18*bs/2, by = -32*bs/2;
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(bx + 36*bs*0.3, by + 32*bs*0.2, 36*bs*0.4, 32*bs*0.35);
    ctx.fillRect(bx + 36*bs*0.6, by + 32*bs*0.15, 36*bs*0.25, 32*bs*0.25);
    ctx.fillStyle = '#fff';
    ctx.fillRect(bx + 36*bs*0.64, by + 32*bs*0.18, 36*bs*0.10, 32*bs*0.10);
    ctx.fillStyle = '#000';
    ctx.fillRect(bx + 36*bs*0.665, by + 32*bs*0.205, 36*bs*0.05, 32*bs*0.05);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(bx + 36*bs*0.75, by + 32*bs*0.22, 36*bs*0.12, 32*bs*0.06);
    ctx.fillStyle = '#888';
    ctx.fillRect(bx + 36*bs*0.42, by + 32*bs*0.02, 36*bs*0.16, 32*bs*0.22);
    ctx.fillRect(bx + 36*bs*0.2, by + 32*bs*0.3, 36*bs*0.2, 32*bs*0.2);
    ctx.restore();

    ctx.restore();

    // +100 coins text
    const coinAlpha = portalSpinTimer > 60 ? 1 : (portalSpinTimer / 60);
    ctx.fillStyle = 'rgba(255,221,0,' + coinAlpha + ')'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText('+100 💰', W/2, H/2 + 120);

    // Entering text
    const destName = portalNextWorld === 2 ? t('world_cny_name') : t('world_midautumn_name');
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Courier New"';
    ctx.fillText(t('portal_label') + ' → ' + destName, W/2, H/2 + 160);

    return;
  }

  // World loading screen
  if (gameState === 'worldLoading') {
    // Same style as game loading screen
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(1, '#98c8fc');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

    // Pixel clouds
    function drawWlCloud(cx, cy, cw, ch) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
      ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
      ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
      ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
    }
    drawWlCloud(50, 60, 120, 60);
    drawWlCloud(580, 40, 150, 70);
    drawWlCloud(300, 90, 100, 50);
    drawWlCloud(680, 120, 90, 45);

    // Green hills
    ctx.fillStyle = '#68b838';
    ctx.fillRect(0, H - 80, 200, 80);
    ctx.fillRect(20, H - 100, 40, 20);
    ctx.fillRect(60, H - 90, 30, 10);
    ctx.fillRect(200, H - 60, 250, 60);
    ctx.fillRect(220, H - 80, 50, 20);
    ctx.fillRect(300, H - 70, 35, 10);
    ctx.fillRect(450, H - 90, 200, 90);
    ctx.fillRect(480, H - 110, 45, 20);
    ctx.fillRect(550, H - 100, 35, 10);
    ctx.fillRect(650, H - 70, 180, 70);
    ctx.fillRect(680, H - 90, 40, 20);

    // White outline bird
    const gs2 = 3;
    const gx2 = W/2 - 18*gs2, gy2 = H/2 - 105;
    const bw2 = 36*gs2, bh2 = 32*gs2;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(gx2 + bw2*0.3, gy2 + bh2*0.2, bw2*0.4, bh2*0.35);
    ctx.strokeRect(gx2 + bw2*0.6, gy2 + bh2*0.15, bw2*0.25, bh2*0.25);
    ctx.strokeRect(gx2 + bw2*0.64, gy2 + bh2*0.18, bw2*0.10, bh2*0.10);
    ctx.strokeRect(gx2 + bw2*0.665, gy2 + bh2*0.205, bw2*0.05, bh2*0.05);
    ctx.strokeRect(gx2 + bw2*0.75, gy2 + bh2*0.22, bw2*0.12, bw2*0.06);
    const wingUp2 = frame % 20 < 10;
    if (wingUp2) ctx.strokeRect(gx2 + bw2*0.42, gy2 + bh2*0.02, bw2*0.16, bh2*0.22);
    else ctx.strokeRect(gx2 + bw2*0.38, gy2 + bh2*0.35, bw2*0.2, bh2*0.22);
    ctx.strokeRect(gx2 + bw2*0.2, gy2 + bh2*0.3, bw2*0.2, bh2*0.2);

    // Title (same as game start loading)
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 36px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText(t('loading_title'), W/2, H/2 + 20);

    // Loading bar
    const barW2 = 600, barH2 = 16, barX2 = W/2 - barW2/2, barY2 = H/2 + 50;
    const progress2 = 1 - (worldLoadingTimer / 90);
    ctx.fillStyle = '#333'; ctx.fillRect(barX2, barY2, barW2, barH2);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(barX2, barY2, barW2, barH2);
    ctx.fillStyle = '#ffdd00'; ctx.fillRect(barX2, barY2, Math.ceil(barW2 * progress2), barH2);

		ctx.fillStyle = '#aaa'; ctx.font = '13px "Courier New"';
    ctx.fillText(t('loading_text'), W/2, barY2 - 10);
		ctx.fillStyle = '#555'; ctx.font = '9px "Courier New"';
		ctx.fillText('v2026.06.14', W/2, H - 24);

    return;
  }

  // Loading screen
  if (gameState === 'loading') {
    // 超级玛丽式蓝天背景
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(1, '#98c8fc');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // 像素白云
    function drawLoadingCloud(cx, cy, cw, ch) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
      ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
      ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
      ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
    }
    drawLoadingCloud(50, 60, 120, 60);
    drawLoadingCloud(580, 40, 150, 70);
    drawLoadingCloud(300, 90, 100, 50);
    drawLoadingCloud(680, 120, 90, 45);

    // 绿色像素小山丘
    ctx.fillStyle = '#68b838';
    ctx.fillRect(0, H - 80, 200, 80);
    ctx.fillRect(20, H - 100, 40, 20);
    ctx.fillRect(60, H - 90, 30, 10);
    ctx.fillRect(200, H - 60, 250, 60);
    ctx.fillRect(220, H - 80, 50, 20);
    ctx.fillRect(300, H - 70, 35, 10);
    ctx.fillRect(450, H - 90, 200, 90);
    ctx.fillRect(480, H - 110, 45, 20);
    ctx.fillRect(550, H - 100, 35, 10);
    ctx.fillRect(650, H - 70, 180, 70);
    ctx.fillRect(680, H - 90, 40, 20);

    // 白色边框小鸟
    const gs = 3;
    const gx = W/2 - 18*gs, gy = H/2 - 105;
    const bw = 36*gs, bh = 32*gs;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    // Body outline
    ctx.strokeRect(gx + bw*0.3, gy + bh*0.2, bw*0.4, bh*0.35);
    // Head outline
    ctx.strokeRect(gx + bw*0.6, gy + bh*0.15, bw*0.25, bh*0.25);
    // Eye (just white border, no fill)
    ctx.strokeRect(gx + bw*0.64, gy + bh*0.18, bw*0.10, bh*0.10);
    // Pupil (small white dot outline)
    ctx.strokeRect(gx + bw*0.665, gy + bh*0.205, bw*0.05, bh*0.05);
    // Beak
    ctx.strokeRect(gx + bw*0.75, gy + bh*0.22, bw*0.12, bw*0.06);
    // Wing (animated)
    const wingUp = frame % 20 < 10;
    if (wingUp) ctx.strokeRect(gx + bw*0.42, gy + bh*0.02, bw*0.16, bh*0.22);
    else ctx.strokeRect(gx + bw*0.38, gy + bh*0.35, bw*0.2, bh*0.22);
    // Tail
    ctx.strokeRect(gx + bw*0.2, gy + bh*0.3, bw*0.2, bh*0.2);
    // Title
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t('loading_title'), W/2, H/2 + 20);

    // Loading bar
    const barW = 600, barH = 16, barX = W/2 - barW/2, barY = H/2 + 50;
    const progress = Math.min(1, frame / 120);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(barX, barY, Math.ceil(barW * progress), barH);

    // Loading text
    ctx.fillStyle = '#aaa';
    ctx.font = '13px "Courier New"';
    ctx.fillText(t('loading_text'), W/2, barY - 10);

    // Version
    ctx.fillStyle = '#555';
    ctx.font = '9px "Courier New"';
    ctx.fillText('v2026.06.14', W/2, H - 24);

    return;
  }

  // Snow screen after character selection
  if (gameState === 'snow') {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    const snowColors = ['#ff4444','#ff8800','#ffdd00','#44ff44','#4488ff','#aa44ff','#ff44aa','#44ffff'];
    for (let i = 0; i < 80; i++) {
      const seed = i * 137.5 + frame * 0.6;
      const sx = ((seed * 73 + i * 17) % W + W) % W;
      const sy = ((seed * 97 + frame * 1.5 + i * 31) % (H + 60)) - 30;
      const size = 3 + ((i * 43) % 5);
      const alpha = 0.4 + 0.6 * Math.sin(frame * 0.05 + i);
      const colorIdx = Math.floor(((i * 29) % snowColors.length));
      ctx.fillStyle = snowColors[colorIdx];
      ctx.globalAlpha = alpha;
      ctx.fillRect(sx, sy, size, size);
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 32px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t('snow_ready'), W/2 + 10, H/2 - 10);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Courier New"';
    const countText = snowTimer > 90 ? '3' : snowTimer > 60 ? '2' : snowTimer > 30 ? '1' : t('snow_go');
    ctx.fillText(countText, W/2, H/2 + 40);

    return;
  }

  drawParallaxBg();

  ctx.save();
  ctx.translate(0, -cameraY);

  for (const c of clouds) {
    if (c.y > cameraY - 100 && c.y < cameraY + H + 100) drawCloud(c.x, c.y, c.w, c.h);
  }
  for (const p of pipes) {
    if (p.y > cameraY - 100 && p.y < cameraY + H + 100) {
      drawPipe(p.x, p.y, p.w, p.h, p.warp && !p.damaged);
      if (p.damaged) {
        ctx.fillStyle = 'rgba(255,0,0,0.35)';
        ctx.fillRect(p.x - 6, p.y - 14, p.w + 12, p.h + 14);
        ctx.fillStyle = '#ff3333'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText('⚠', p.x + p.w/2, p.y - 16);
      }
    }
  }
  for (const p of platforms) {
    if (p.y > cameraY - 100 && p.y < cameraY + H + 100) {
      if (p.type === 'cloud') {
        // Draw cloud platform
        const cx = p.x, cy = p.y, cw = p.w, ch = p.h;
        ctx.fillStyle = p.damaged ? '#ccc' : '#ffffff';
        ctx.fillRect(cx + cw*0.2, cy + ch*0.3, cw*0.6, ch*0.5);
        ctx.fillRect(cx + cw*0.1, cy + ch*0.15, cw*0.4, ch*0.5);
        ctx.fillRect(cx + cw*0.5, cy + ch*0.2, cw*0.4, ch*0.45);
        ctx.fillRect(cx + cw*0.3, cy, cw*0.35, ch*0.4);
        if (!p.damaged) {
          ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 1;
          ctx.strokeRect(cx, cy, cw, ch);
        }
        continue;
      }
      
      if (p.type === 'ground') drawGround(p.x, p.y, p.w, p.h);
      else if (p.type === 'mystery') drawMysteryBox(p.x, p.y, p.w, p.h, frame);
      else if (p.type === 'goal') { drawBrick(p.x, p.y, p.w, p.h); ctx.fillStyle = '#ffdd00'; ctx.fillRect(p.x, p.y, p.w, 3); ctx.fillRect(p.x, p.y + p.h - 3, p.w, 3); }
      else drawBrick(p.x, p.y, p.w, p.h);
      // Damaged platform visual
      if (p.damaged && p.type !== 'ground' && p.type !== 'goal') {
        ctx.fillStyle = 'rgba(255,0,0,0.35)';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#ff3333'; ctx.font = 'bold 10px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText('⚠', p.x + p.w/2, p.y - 2);
      }
    }
  }
  // Draw gray bird
  if (grayBird) drawGrayBird(grayBird);

  for (const c of coins) {
    if (c.collected) continue;
    if (c.y > cameraY - 50 && c.y < cameraY + H + 50) drawCoin(c.x, c.y, c.r, frame);
  }

  // Goal flag / Portal
  const goalPlat = platforms.find(p => p.type === 'goal');
  if (goalPlat && goalPlat.y > cameraY - 100 && goalPlat.y < cameraY + H + 100) {
    const gx = goalPlat.x + goalPlat.w / 2, gy = goalPlat.y;
    const allUnlockedGoalW1 = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'].every(function(k) { return !isLockedT1(k); });
    const allUnlockedGoalW2 = ['小蓝莓','小绿','小芒果','白白','蓝蓝','gray'].every(function(k) { return !isLockedT2(k); }) || localStorage.getItem('superBirdsWorld3Unlocked') === '1';
    const showPortal = (currentWorld === 1 && allUnlockedGoalW1) || (currentWorld === 2 && allUnlockedGoalW2);

    if (showPortal) {
      // Portal at goal
      ctx.save();
      const pr = 36;
      const glowA = 0.3 + Math.sin(frame * 0.05) * 0.15;
      const glowG = ctx.createRadialGradient(gx, gy - pr, pr * 0.3, gx, gy - pr, pr * 1.8);
      glowG.addColorStop(0, 'rgba(100,200,255,' + glowA + ')');
      glowG.addColorStop(0.5, 'rgba(80,150,255,' + (glowA*0.5) + ')');
      glowG.addColorStop(1, 'rgba(40,80,200,0)');
      ctx.fillStyle = glowG; ctx.fillRect(gx - pr*2, gy - pr*3, pr*4, pr*5);
      // Outer ring
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(gx, gy - pr, pr, 0, Math.PI * 2); ctx.stroke();
      const ang = frame * 0.04;
      for (let a = 0; a < 6; a++) {
        const aa = ang + a * Math.PI / 3;
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(gx + Math.cos(aa) * pr - 3, gy - pr + Math.sin(aa) * pr - 3, 6, 6);
      }
      // Inner ring
      ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(gx, gy - pr, pr * 0.55, 0, Math.PI * 2); ctx.stroke();
      // Center glow
      const inG = ctx.createRadialGradient(gx, gy - pr, 0, gx, gy - pr, pr * 0.5);
      inG.addColorStop(0, '#fff'); inG.addColorStop(0.3, '#aaddff'); inG.addColorStop(1, 'rgba(40,80,200,0)');
      ctx.fillStyle = inG; ctx.beginPath(); ctx.arc(gx, gy - pr, pr * 0.5, 0, Math.PI*2); ctx.fill();
      // Label
      ctx.fillStyle = '#aaddff'; ctx.font = 'bold 12px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText(currentWorld === 1 ? t('portal_to_cny') : currentWorld === 2 ? t('portal_to_midautumn') : t('portal_label'), gx, gy + 14);
      ctx.restore();
    } else {
      // Normal flag
      ctx.font = '36px "Courier New"'; ctx.textAlign = 'center';
      ctx.fillText('🚩', gx, gy - 32);
      const elapsed = Math.floor((frame - gameStartFrame) / 60);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
      const tboxW = 72, tboxH = 22, tboxX = gx - tboxW/2, tboxY = gy - 19;
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(tboxX, tboxY, tboxW, tboxH);
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2; ctx.strokeRect(tboxX, tboxY, tboxW, tboxH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px "Courier New"';
      ctx.fillText(timeStr, gx, gy - 4);
      ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 14px "Courier New"';
      ctx.fillText(currentWorld === 3 ? '3000m' : currentWorld === 2 ? '2000m' : '1000m', gx, gy + 18);
    }
  }

  // Draw all 4 birds
  for (const b of getAllBirds()) {
    drawBirdByType(b, b.x, b.y, BIRD_W, BIRD_H, frame);
  }

  ctx.restore();

  // --- HUD: 6 panels in 3 columns ---
  const panelW = 190, panelH = 36;
  const birds = getAllBirds();
  const colX = [5, (W - panelW) / 2, W - panelW - 5];

  for (let i = 0; i < birds.length; i++) {
    const b = birds[i];
    const px = colX[i % 3];
    const py = 10 + Math.floor(i / 3) * (panelH + 6);

    const tagColor = b.color;
    drawHudPanel(px, py, panelW, panelH, b, tagColor);

    ctx.fillStyle = tagColor;
    ctx.font = 'bold 11px "Courier New"';
    ctx.textAlign = 'left';

    const h = Math.max(0, Math.floor(b.maxHeight / 10));
    const curH = Math.max(0, Math.floor((460 - b.y) / 10));
    let tag;
    if (winner === b) {
      if (b.controller === 'p1') tag = t('tag_you_win');
      else if (p1Bird && isCP(b, p1Bird)) tag = t('tag_cp_win');
      else tag = t('tag_opp_win');
    } else {
      if (b.controller === 'p1') tag = t('tag_player');
      else if (!p1Bird && !grayBirdPlayer) tag = t('tag_unknown');
      else if (p1Bird && isCP(b, p1Bird)) tag = t('tag_cp');
      else tag = t('tag_opp');
    }

    // Spectate glow on non-player panel being watched
    const isSpectated = spectateBird === b && spectateTimer > 0;
    if (isSpectated) {
      ctx.fillStyle = 'rgba(255,255,0,0.25)'; ctx.fillRect(px, py, panelW, panelH);
      ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 2; ctx.strokeRect(px, py, panelW, panelH);
    }

    ctx.fillText(bn(b)+tag, px + 6, py + 14);
    const dj = b.hasDoubleJump ? ' [2x]' : '';
    ctx.fillText(`${curH}m  ¢${b.coins}${dj}`, px + 6, py + 28);

    // Direction indicators — show each bird's own controls
    const ctrl = b.lastCtrl || { left: false, right: false, jump: false, down: false };
    const arrs = [
      { label: '↑', on: ctrl.jump },
      { label: '←', on: ctrl.left },
      { label: '↓', on: ctrl.down },
      { label: '→', on: ctrl.right },
    ];
    ctx.font = '8px "Courier New"';
    ctx.textAlign = 'center';
    let ax = px + panelW - 16;
    for (let j = arrs.length - 1; j >= 0; j--) {
      const ar = arrs[j];
      if (ar.on) { ctx.fillStyle = '#ff4444'; ctx.fillText('●', ax, py + 10); }
      ctx.fillStyle = ar.on ? '#ffdd00' : '#555';
      ctx.fillText(ar.label, ax, py + 24);
      ax -= 18;
    }
    ctx.textAlign = 'left';
  }


  // Spectating indicator
  if (spectateBird && spectateTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.8)';
    ctx.font = 'bold 11px "Courier New"';
    ctx.textAlign = 'center';
    const sec = Math.ceil(spectateTimer / 60);
    const specName = spectateBird === grayBird ? t('bird_gray') : bn(spectateBird);
    ctx.fillText('👁 ' + specName + ' ' + sec + 's', W/2, 106);
  }

  // Height comparison bar (all birds + gray bird)
  const barEntries = grayBird ? [...birds, grayBird] : birds;
  const barW = 250, barH = 4;
  const barX = W/2 - barW/2, barY = 138;
